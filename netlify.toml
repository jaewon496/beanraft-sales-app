# Netlify 설정 파일
# 빈크래프트 앱 - 2026-01-28

[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "18"

# API 프록시 라우트
[[redirects]]
  from = "/api/sbiz-proxy"
  to = "/.netlify/functions/sbiz-proxy"
  status = 200

[[redirects]]
  from = "/api/sbiz-proxy/*"
  to = "/.netlify/functions/sbiz-proxy/:splat"
  status = 200

# SPA 라우팅
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# 헤더 설정
[[headers]]
  for = "/api/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Methods = "GET, POST, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type, Authorization"
