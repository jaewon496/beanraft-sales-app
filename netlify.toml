# HTML pages: 200 proxy (same-origin for CSS injection) - MUST be LAST /site/* rule
[[redirects]]
  from = "/site/*"
  to = "https://www.beancraft.co.kr/:splat"
  status = 200
  force = true

[[redirects]]
