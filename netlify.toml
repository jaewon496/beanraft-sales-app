[[headers]]
  for = "/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Methods = "GET, POST, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type"

# Service Worker - 캐시 비활성화 (항상 최신 버전)
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Service-Worker-Allowed = "/"

# PWA manifest
[[headers]]
  for = "/manifest.json"
  [headers.values]
    Content-Type = "application/manifest+json"
    Cache-Control = "no-cache"

# Edge Function: browser cache for /site/* to reduce proxy requests (429 prevention)
[[edge_functions]]
  function = "site-cache"
  path = "/site/*"

# Edge Function: rewrite Set-Cookie headers from beancraft.co.kr proxy
# Removes domain= attribute so cookies work on beancraft-sales.netlify.app
[[edge_functions]]
  function = "cookie-rewrite"
  path = "/umember/*"

[[edge_functions]]
  function = "cookie-rewrite"
  path = "/uevent/*"

[[edge_functions]]
  function = "cookie-rewrite"
  path = "/uboard/*"

[[edge_functions]]
  function = "cookie-rewrite"
  path = "/uproduct/*"

[[edge_functions]]
  function = "cookie-rewrite"
  path = "/ushop/*"


