# Netlify 설정 파일
# 빈크래프트 앱 - 2026-01-27

[build]
  # 빌드 명령어 (Vite 기준)
  command = "npm run build"
  # 빌드 출력 디렉토리
  publish = "dist"
  # Functions 디렉토리
  functions = "netlify/functions"

[functions]
  # Node.js 번들러
  node_bundler = "esbuild"
  # 타임아웃 (초)
  timeout = 26

# 환경 변수 (민감 정보는 Netlify 대시보드에서 설정)
[build.environment]
  NODE_VERSION = "18"

# API 프록시 라우트 (중요: SPA fallback보다 먼저 배치)
[[redirects]]
  from = "/api/sbiz-proxy"
  to = "/.netlify/functions/sbiz-proxy"
  status = 200

[[redirects]]
  from = "/api/sbiz-proxy/*"
  to = "/.netlify/functions/sbiz-proxy/:splat"
  status = 200

# SPA 라우팅 (React Router)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# 개발 서버 설정
[dev]
  port = 8888
  functionsPort = 9999
  autoLaunch = false

# 헤더 설정
[[headers]]
  for = "/api/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Methods = "GET, POST, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type, Authorization"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
