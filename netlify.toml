[build]
  publish = "dist"
  command = "npm run build"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

[functions."gemini-proxy"]
  timeout = 26

[functions."naver-local-proxy"]
  timeout = 26

[functions."ncp-geo-proxy"]
  timeout = 26

[functions."kakao-proxy"]
  timeout = 26

[functions."sbiz-proxy"]
  timeout = 26

[functions."reset-password"]
  timeout = 26

[functions."create-account"]
  timeout = 26

# Static assets: 302 redirect (browser fetches directly from origin, reduces proxy load)
[[redirects]]
  from = "/site/_resource/*"
  to = "https://www.beancraft.co.kr/_resource/:splat"
  status = 302
  force = true

[[redirects]]
  from = "/site/_script/*"
