# Netlify 설정 파일
# 빈크래프트 앱 - 2026-01-29 v2

[build]
  command = "npm ci && npm run build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "18"
  NPM_FLAGS = "--prefer-offline"

# API 프록시 라우트
[[redirects]]
  from = "/api/sbiz-proxy"
  to = "/.netlify/functions/sbiz-proxy"
  status = 200

[[redirects]]
  from = "/api/sbiz-proxy/*"
  to = "/.netlify/functions/sbiz-proxy/:splat"
  status = 200

# SPA 라우팅
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# 헤더 설정 - API
[[headers]]
  for = "/api/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Methods = "GET, POST, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type, Authorization"

# 헤더 설정 - JS/CSS 파일 (캐시 무효화)
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# 헤더 설정 - HTML (캐시 안함)
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
