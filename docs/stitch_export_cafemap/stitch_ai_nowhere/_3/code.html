</button>

<main class="flex-1 relative flex flex-col items-center justify-center bg-[#050505] w-full pb-[80px]">

<div class="absolute inset-0 opacity-[0.03] bg-[linear-gradient(to_right,#ffffff_1px,transparent_1px),linear-gradient(to_bottom,#ffffff_1px,transparent_1px)] bg-[size:4rem_4rem] pointer-events-none"></div>

<div class="relative z-10 flex flex-col items-center justify-center max-w-sm px-6 text-center">

<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-48 h-48 bg-secondary-container opacity-[0.08] blur-[60px] rounded-full pointer-events-none"></div>
<!-- Icon -->
<div class="mb-6 relative flex items-center justify-center">
<span class="material-symbols-outlined text-[48px] text-primary" style="font-variation-settings: 'FILL' 0, 'wght' 200;">info</span>
</div>

<h2 class="text-[18px] font-medium text-primary mb-2 tracking-tight">반경 내 카페가 없습니다</h2>
<p class="text-[14px] font-light text-on-surface-variant">반경을 늘려보세요</p>

</main>
