<body class="bg-background font-body text-on-background h-screen w-screen overflow-hidden relative">

<div class="absolute inset-0 bg-surface-container-lowest z-0">

<div class="bg-surface-tint rounded-xl p-4 shadow-[0_12px_40px_rgba(0,0,0,0.8)] mb-3 relative min-w-[220px]">

<div class="flex flex-col">
<h3 class="font-headline font-bold text-on-primary text-[18px] tracking-tight leading-tight">스타벅스 강남R점</h3>
<p class="font-body text-on-primary/60 text-[13px] mt-1 font-light">서울 강남구 역삼동 814</p>

<div class="mt-3 inline-flex items-center gap-1 bg-tertiary/10 text-tertiary px-2 py-1 rounded w-max">
<span class="material-symbols-outlined text-[14px]">directions_walk</span>

</div>
</div>

<div class="absolute -bottom-1 left-1/2 -translate-x-1/2 w-6 h-4 bg-surface-tint z-0"></div>
</div>
<!-- Marker Icon -->
<div class="relative flex items-center justify-center mt-1">
<!-- Subtle pulse glow behind marker -->
<div class="absolute w-10 h-10 bg-tertiary/20 rounded-full animate-pulse blur-sm"></div>

<span class="material-symbols-outlined text-[44px] text-tertiary drop-shadow-[0_0_15px_rgba(59,130,246,0.6)] relative z-10" style="font-variation-settings: 'FILL' 1;">location_on</span>
