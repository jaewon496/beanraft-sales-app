<!DOCTYPE html>

<html class="dark" lang="ko"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Cafe Intelligence - Map Error</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "surface-variant": "#353535",
                    "error": "#DC2626",
                    "on-tertiary": "#FFFFFF",
                    "on-secondary-fixed": "#00164E",
                    "on-error-container": "#FFDAD6",
                    "on-primary-fixed": "#000000",
                    "primary-fixed-dim": "#E2E2E2",
                    "secondary-fixed": "#DCE1FF",
                    "on-surface": "#FFFFFF",
                    "surface-container": "#1F1F1F",
                    "on-primary-fixed-variant": "#454747",
                    "surface-container-low": "#1B1B1B",
                    "tertiary": "#3B82F6",
                    "surface-dim": "#0E0E0E",
                    "outline-variant": "#444651",
                    "on-tertiary-fixed-variant": "#00458E",
                    "tertiary-fixed": "#D1E4FF",
                    "primary-fixed": "#FFFFFF",
                    "inverse-primary": "#1E3A8A",
                    "secondary-fixed-dim": "#B6C4FF",
                    "inverse-surface": "#FFFFFF",
                    "surface-container-lowest": "#000000",
                    "on-primary-container": "#FFFFFF",
                    "secondary": "#1E3A8A",
                    "primary": "#FFFFFF",
                    "on-background": "#FFFFFF",
                    "on-secondary": "#FFFFFF",
                    "inverse-on-surface": "#131313",
                    "on-tertiary-container": "#B6C4FF",
                    "on-secondary-fixed-variant": "#264191",
                    "surface-tint": "#FFFFFF",
                    "surface-container-high": "#2A2A2A",
                    "error-container": "#93000A",
                    "surface-container-highest": "#353535",
                    "on-tertiary-fixed": "#001D47",
                    "secondary-container": "#1E3A8A",
                    "on-secondary-container": "#B6C4FF",
                    "surface": "#131313",
                    "surface-bright": "#393939",
                    "tertiary-fixed-dim": "#ADC6FF",
                    "outline": "#8F909D",
                    "tertiary-container": "#1E3A8A",
                    "on-primary": "#000000",
                    "on-surface-variant": "#B8B8B8",
                    "background": "#000000",
                    "primary-container": "#1E3A8A",
                    "on-error": "#FFFFFF"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": ["Inter"],
                    "body": ["Inter"],
                    "label": ["Inter"]
            }
          },
        },
      }
    </script>
<style>
        body { font-family: 'Inter', sans-serif; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background min-h-screen flex items-center justify-center font-body p-4 md:p-8 relative">
<!-- Top Navigation (Context) -->
<nav class="fixed top-0 w-full z-50 bg-[#0E0E0E]/90 backdrop-blur-none bg-[#1B1B1B] flex justify-between items-center px-6 py-4">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-tertiary text-2xl">map</span>
<span class="font-headline text-[18px] font-medium tracking-tight text-white">Cafe Intelligence</span>
</div>
<button class="text-[#B8B8B8] hover:bg-[#1B1B1B] transition-colors scale-95 duration-200 p-2 rounded-full flex items-center justify-center">
<span class="material-symbols-outlined">settings</span>
</button>
</nav>
<!-- Modal Container (Simulating iPhone 15 Pro aspect ratio constraint locally, but responsive) -->
<main class="w-full max-w-[430px] aspect-[19.5/9] max-h-[932px] h-[707px] relative mt-16 md:mt-0 flex flex-col bg-surface-container-lowest rounded-2xl md:rounded-[40px] overflow-hidden border border-outline-variant/20 shadow-2xl z-10">
<!-- Header area for modal -->
<header class="p-6 flex justify-between items-center border-b border-outline-variant/10 z-20 bg-surface-container-low/80 backdrop-blur-md relative">
<div class="absolute inset-0 bg-secondary-container opacity-5 blur-3xl pointer-events-none"></div>
<h1 class="font-headline text-lg font-medium tracking-tight">Location Details</h1>
<button aria-label="Close" class="text-on-surface-variant hover:text-white transition-colors">
<span class="material-symbols-outlined">close</span>
</button>
</header>
<!-- Map Content Area (Error State) -->
<section class="flex-grow bg-surface-container-low relative flex flex-col items-center justify-center p-6 text-center overflow-hidden">
<!-- Abstract background pattern hinting at map grid -->
<div class="absolute inset-0 opacity-[0.03] pointer-events-none" style="background-image: radial-gradient(#FFFFFF 1px, transparent 1px); background-size: 20px 20px;"></div>
<!-- Atmospheric Error Glow -->
<div class="absolute inset-0 bg-error/5 blur-[100px] pointer-events-none flex items-center justify-center">
<div class="w-32 h-32 bg-error/10 rounded-full blur-2xl"></div>
</div>
<div class="z-10 flex flex-col items-center max-w-xs">
<div class="w-16 h-16 rounded-full bg-surface-container flex items-center justify-center mb-6 border border-outline-variant/20 shadow-lg relative">
<!-- Inner glow for icon -->
<div class="absolute inset-0 bg-[#FBBF24]/10 rounded-full blur-sm"></div>
<span class="material-symbols-outlined text-[#FBBF24] text-3xl" style="font-variation-settings: 'FILL' 1;">warning</span>
</div>
<h2 class="font-headline text-xl font-bold mb-2 tracking-tight">지도를 불러올 수 없습니다</h2>
<p class="font-body text-on-surface-variant text-sm mb-8 leading-relaxed">네이버 지도 인증에 실패했습니다.<br/>잠시 후 다시 시도해주세요.</p>
<!-- Button -->
<button class="flex items-center justify-center gap-2 w-full py-3 px-6 rounded border border-outline-variant text-white hover:bg-surface-container transition-colors font-medium text-sm focus:outline-none focus:ring-2 focus:ring-outline-variant/50">
<span class="material-symbols-outlined text-sm">refresh</span>
                     다시 시도
                 </button>
</div>
</section>
<!-- Bottom Sheet Handle/Context -->
<div class="h-1 bg-surface-container-highest w-12 rounded-full absolute bottom-2 left-1/2 -translate-x-1/2 hidden md:block"></div>
</main>
<!-- Bottom Navigation Shell (Context, Suppressed visually but structure exists) -->
<nav class="fixed bottom-0 left-0 w-full bg-[#0E0E0E] flex justify-around items-center py-3 px-4 border-t border-white/10 shadow-[0_-8px_30px_rgba(59,130,246,0.05)] md:hidden z-0 opacity-50 pointer-events-none">
<a class="flex flex-col items-center justify-center text-blue-500 font-medium" href="#">
<span class="material-symbols-outlined">explore</span>
<span class="font-['Inter'] text-[12px] font-light mt-1">Explorer</span>
</a>
<a class="flex flex-col items-center justify-center text-[#B8B8B8]" href="#">
<span class="material-symbols-outlined">analytics</span>
<span class="font-['Inter'] text-[12px] font-light mt-1">Insights</span>
</a>
<a class="flex flex-col items-center justify-center text-[#B8B8B8]" href="#">
<span class="material-symbols-outlined">domain</span>
<span class="font-['Inter'] text-[12px] font-light mt-1">Portfolio</span>
</a>
<a class="flex flex-col items-center justify-center text-[#B8B8B8]" href="#">
<span class="material-symbols-outlined">notifications</span>
<span class="font-['Inter'] text-[12px] font-light mt-1">Alerts</span>
</a>
</nav>
</body></html>
