<!DOCTYPE html>

<html class="dark" lang="ko"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>카페 위치 지도</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-variant": "#353535",
                        "error": "#DC2626",
                        "on-tertiary": "#FFFFFF",
                        "on-secondary-fixed": "#00164E",
                        "on-error-container": "#FFDAD6",
                        "on-primary-fixed": "#000000",
                        "primary-fixed-dim": "#E2E2E2",
                        "secondary-fixed": "#DCE1FF",
                        "on-surface": "#FFFFFF",
                        "surface-container": "#1F1F1F",
                        "on-primary-fixed-variant": "#454747",
                        "surface-container-low": "#1B1B1B",
                        "tertiary": "#3B82F6",
                        "surface-dim": "#0E0E0E",
                        "outline-variant": "#444651",
                        "on-tertiary-fixed-variant": "#00458E",
                        "tertiary-fixed": "#D1E4FF",
                        "primary-fixed": "#FFFFFF",
                        "inverse-primary": "#1E3A8A",
                        "secondary-fixed-dim": "#B6C4FF",
                        "inverse-surface": "#FFFFFF",
                        "surface-container-lowest": "#000000",
                        "on-primary-container": "#FFFFFF",
                        "secondary": "#1E3A8A",
                        "primary": "#FFFFFF",
                        "on-background": "#FFFFFF",
                        "on-secondary": "#FFFFFF",
                        "inverse-on-surface": "#131313",
                        "on-tertiary-container": "#B6C4FF",
                        "on-secondary-fixed-variant": "#264191",
                        "surface-tint": "#FFFFFF",
                        "surface-container-high": "#2A2A2A",
                        "error-container": "#93000A",
                        "surface-container-highest": "#353535",
                        "on-tertiary-fixed": "#001D47",
                        "secondary-container": "#1E3A8A",
                        "on-secondary-container": "#B6C4FF",
                        "surface": "#131313",
                        "surface-bright": "#393939",
                        "tertiary-fixed-dim": "#ADC6FF",
                        "outline": "#8F909D",
                        "tertiary-container": "#1E3A8A",
                        "on-primary": "#000000",
                        "on-surface-variant": "#B8B8B8",
                        "background": "#000000",
                        "primary-container": "#1E3A8A",
                        "on-error": "#FFFFFF"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Inter"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    }
                }
            }
        }
    </script>
<style>
        body { font-family: 'Inter', sans-serif; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-background text-on-background min-h-screen flex items-center justify-center font-body p-4 md:p-8">
<!-- Modal Container (Simulating iPhone 15 Pro) -->
<div class="w-full max-w-[393px] h-[852px] bg-surface-container-lowest rounded-[3rem] overflow-hidden relative shadow-2xl ring-1 ring-white/10 flex flex-col">
<!-- Header Section -->
<div class="bg-[#0E0E0E]/90 backdrop-blur-none docked full-width top-0 z-50 pt-8">
<div class="flex justify-between items-center w-full px-6 py-4">
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-on-surface-variant text-2xl">arrow_back</span>
<h1 class="font-['Inter'] text-[18px] font-medium tracking-tight text-white">카페 위치 지도</h1>
</div>
<button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-[#1B1B1B] transition-colors">
<span class="material-symbols-outlined text-on-surface-variant">close</span>
</button>
</div>
<!-- Radius Slider Section -->
<div class="px-6 pb-4 pt-2 border-b border-surface-container-low">
<div class="flex justify-between items-center mb-2">
<span class="text-sm font-medium text-on-surface-variant">검색 반경</span>
<span class="text-lg font-bold text-tertiary">500m</span>
</div>
<input class="w-full h-1 bg-surface-container-highest rounded-lg appearance-none cursor-pointer accent-tertiary" max="2000" min="100" type="range" value="500"/>
<div class="flex justify-between text-xs text-on-surface-variant mt-2 opacity-60">
<span>100m</span>
<span>2km</span>
</div>
</div>
</div>
<!-- Filter Bar -->
<div class="bg-surface-container-lowest z-40 shadow-[0_8px_30px_rgba(0,0,0,0.5)]">
<div class="flex items-center justify-between px-6 py-3">
<span class="text-sm font-medium text-white">총 <span class="text-tertiary font-bold">345개</span>의 결과</span>
</div>
<div class="flex overflow-x-auto scrollbar-hide px-6 pb-4 gap-2">
<!-- Chips -->
<button class="flex items-center gap-1.5 px-3 py-1.5 rounded-full bg-error/10 border border-error/20 whitespace-nowrap">
<div class="w-2 h-2 rounded-full bg-error"></div>
<span class="text-xs font-medium text-error">검색 위치</span>
</button>
<button class="flex items-center gap-1.5 px-3 py-1.5 rounded-full bg-tertiary/10 border border-tertiary/20 whitespace-nowrap">
<div class="w-2 h-2 rounded-full bg-tertiary"></div>
<span class="text-xs font-medium text-tertiary">프랜차이즈</span>
</button>
<button class="flex items-center gap-1.5 px-3 py-1.5 rounded-full bg-green-500/10 border border-green-500/20 whitespace-nowrap">
<div class="w-2 h-2 rounded-full bg-green-500"></div>
<span class="text-xs font-medium text-green-500">개인카페</span>
</button>
<button class="flex items-center gap-1.5 px-3 py-1.5 rounded-full bg-orange-500/10 border border-orange-500/20 whitespace-nowrap">
<div class="w-2 h-2 rounded-full bg-orange-500"></div>
<span class="text-xs font-medium text-orange-500">베이커리</span>
</button>
<button class="flex items-center gap-1.5 px-3 py-1.5 rounded-full bg-purple-500/10 border border-purple-500/20 whitespace-nowrap">
<div class="w-2 h-2 rounded-full bg-purple-500"></div>
<span class="text-xs font-medium text-purple-500">신규 오픈</span>
</button>
</div>
</div>
<!-- Map Area -->
<div class="flex-1 relative bg-[#1A1A2E] overflow-hidden">
<!-- Simulated Map Background -->
<div class="absolute inset-0 bg-[url('https://images.unsplash.com/photo-1524661135-423995f22d0b?ixlib=rb-4.0.3&amp;auto=format&amp;fit=crop&amp;w=800&amp;q=80')] bg-cover bg-center opacity-30 mix-blend-luminosity" data-alt="Dark, moody overhead map view of an urban grid with subtle glowing streets at night" data-location="Seoul" style=""></div>
<!-- Map Overlay to darken -->
<div class="absolute inset-0 bg-gradient-to-t from-surface-container-lowest via-transparent to-surface-container-lowest/50"></div>
<!-- POI Marker (Gangnam Stn) -->
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 flex flex-col items-center">
<div class="w-12 h-12 rounded-full border border-error/30 bg-error/10 flex items-center justify-center animate-pulse">
<div class="w-4 h-4 rounded-full bg-error shadow-[0_0_15px_rgba(220,38,38,0.8)]"></div>
</div>
<span class="mt-1 text-[12px] font-medium text-white bg-black/60 px-2 py-0.5 rounded backdrop-blur-sm whitespace-nowrap">강남역 1번 출구</span>
</div>
<!-- 500m Radius Indicator -->
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-64 h-64 rounded-full border-2 border-tertiary/30 bg-tertiary/5 pointer-events-none"></div>
<!-- Cafe Markers (Scattered) -->
<div class="absolute top-[30%] left-[20%] w-6 h-6 rounded-full bg-surface-container-low border border-outline-variant flex items-center justify-center shadow-lg"><span class="w-2 h-2 rounded-full bg-tertiary"></span></div>
<div class="absolute top-[45%] left-[70%] w-6 h-6 rounded-full bg-surface-container-low border border-outline-variant flex items-center justify-center shadow-lg"><span class="w-2 h-2 rounded-full bg-tertiary"></span></div>
<div class="absolute top-[60%] left-[40%] w-6 h-6 rounded-full bg-surface-container-low border border-outline-variant flex items-center justify-center shadow-lg"><span class="w-2 h-2 rounded-full bg-tertiary"></span></div>
<div class="absolute top-[25%] left-[65%] w-6 h-6 rounded-full bg-surface-container-low border border-outline-variant flex items-center justify-center shadow-lg"><span class="w-2 h-2 rounded-full bg-tertiary"></span></div>
<div class="absolute top-[75%] left-[30%] w-6 h-6 rounded-full bg-surface-container-low border border-outline-variant flex items-center justify-center shadow-lg"><span class="w-2 h-2 rounded-full bg-tertiary"></span></div>
<!-- Highlighted Cafe Marker -->
<div class="absolute top-[35%] left-[45%] flex flex-col items-center">
<div class="w-8 h-8 rounded-full bg-tertiary border-2 border-primary flex items-center justify-center shadow-[0_0_15px_rgba(59,130,246,0.4)] z-10">
<span class="material-symbols-outlined text-[16px] text-primary" data-icon="local_cafe">local_cafe</span>
</div>
</div>
</div>
</div>
</body></html>
