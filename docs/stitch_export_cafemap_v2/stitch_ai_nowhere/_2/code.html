<!DOCTYPE html>

<html class="dark" lang="ko"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>카페 위치 지도</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-surface-variant": "#B8B8B8",
                        "primary": "#FFFFFF",
                        "on-tertiary-fixed-variant": "#00458E",
                        "on-error-container": "#FFDAD6",
                        "on-background": "#FFFFFF",
                        "inverse-surface": "#FFFFFF",
                        "secondary-fixed-dim": "#B6C4FF",
                        "secondary-fixed": "#DCE1FF",
                        "secondary-container": "#1E3A8A",
                        "outline-variant": "#444651",
                        "on-primary-fixed-variant": "#454747",
                        "tertiary-fixed-dim": "#ADC6FF",
                        "primary-fixed": "#FFFFFF",
                        "primary-fixed-dim": "#E2E2E2",
                        "primary-container": "#1E3A8A",
                        "tertiary-container": "#1E3A8A",
                        "tertiary-fixed": "#D1E4FF",
                        "secondary": "#1E3A8A",
                        "background": "#000000",
                        "surface-dim": "#0E0E0E",
                        "surface-bright": "#393939",
                        "surface": "#131313",
                        "on-secondary-container": "#B6C4FF",
                        "surface-container-high": "#2A2A2A",
                        "on-primary-fixed": "#000000",
                        "surface-container-highest": "#353535",
                        "outline": "#8F909D",
                        "error": "#DC2626",
                        "on-tertiary": "#FFFFFF",
                        "on-error": "#FFFFFF",
                        "tertiary": "#3B82F6",
                        "surface-variant": "#353535",
                        "on-primary": "#000000",
                        "inverse-primary": "#1E3A8A",
                        "inverse-on-surface": "#131313",
                        "error-container": "#93000A",
                        "on-secondary": "#FFFFFF",
                        "on-tertiary-fixed": "#001D47",
                        "on-surface": "#FFFFFF",
                        "on-primary-container": "#FFFFFF",
                        "surface-tint": "#FFFFFF",
                        "surface-container-low": "#1B1B1B",
                        "on-tertiary-container": "#B6C4FF",
                        "surface-container-lowest": "#000000",
                        "surface-container": "#1F1F1F",
                        "on-secondary-fixed": "#00164E",
                        "on-secondary-fixed-variant": "#264191"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Inter"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    }
                },
            },
        }
    </script>
<style>
        body { font-family: 'Inter', sans-serif; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-background text-on-background min-h-screen flex flex-col font-body antialiased">
<!-- TopAppBar -->
<header class="bg-[#0E0E0E]/90 backdrop-blur-none docked full-width top-0 bg-[#1B1B1B] flat no shadows flex justify-between items-center w-full px-6 py-4 z-40 sticky">
<button aria-label="Menu" class="flex items-center justify-center hover:bg-[#1B1B1B] transition-colors scale-95 duration-200 rounded-full p-2 text-primary">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">map</span>
</button>
<div class="text-lg font-bold text-white tracking-tighter">
            카페 위치 지도
        </div>
<button aria-label="Settings" class="flex items-center justify-center hover:bg-[#1B1B1B] transition-colors scale-95 duration-200 rounded-full p-2 text-primary">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">settings</span>
</button>
</header>
<!-- Main Content - Map Error Modal -->
<main class="flex-grow relative flex items-center justify-center pb-20 md:pb-0">
<!-- Background Map Placeholder (Darkened) -->
<div class="absolute inset-0 z-0 bg-surface-container-low opacity-50 flex flex-col">
<div class="flex-grow grid grid-cols-4 grid-rows-4 gap-0.5 opacity-20">
<!-- Decorative grid to simulate a map background -->
<div class="bg-surface-variant rounded-sm col-span-2 row-span-1"></div>
<div class="bg-surface-variant rounded-sm col-span-1 row-span-2"></div>
<div class="bg-surface-variant rounded-sm col-span-1 row-span-1"></div>
<div class="bg-surface-variant rounded-sm col-span-1 row-span-1"></div>
<div class="bg-surface-variant rounded-sm col-span-2 row-span-2"></div>
<div class="bg-surface-variant rounded-sm col-span-1 row-span-3"></div>
<div class="bg-surface-variant rounded-sm col-span-1 row-span-1"></div>
<div class="bg-surface-variant rounded-sm col-span-2 row-span-1"></div>
</div>
</div>
<!-- Error Modal Content -->
<div class="relative z-10 flex flex-col items-center justify-center p-8 max-w-sm w-full mx-4 bg-surface-container-lowest rounded-2xl shadow-[0_0_80px_rgba(30,58,138,0.05)] border border-outline-variant/20">
<!-- Warning Icon -->
<div class="mb-6 flex items-center justify-center w-16 h-16 rounded-full bg-error-container/20">
<span class="material-symbols-outlined text-4xl text-[#F59E0B]" style="font-variation-settings: 'FILL' 1;">warning</span>
</div>
<!-- Error Text -->
<div class="text-center space-y-2 mb-8">
<h2 class="font-headline text-[18px] font-bold text-on-background tracking-tight">지도를 불러올 수 없습니다</h2>
<p class="font-body text-[14px] text-on-surface-variant font-light">네이버 지도 인증에 실패했습니다</p>
</div>
<!-- Retry Button -->
<button class="w-full py-3 px-6 rounded-lg bg-transparent border border-white text-white font-medium text-[14px] hover:bg-white/10 transition-colors duration-200 active:scale-95 flex items-center justify-center space-x-2">
<span class="material-symbols-outlined text-sm" style="font-variation-settings: 'FILL' 0;">refresh</span>
<span>다시 시도</span>
</button>
</div>
</main>
</body></html>
