<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>빈크래프트 영업모드 · 결과 리포트</title>

<link rel="stylesheet" href="lib/colors_and_type.css"/>
<link rel="stylesheet" href="lib/sales.css"/>
<link rel="stylesheet" href="lib/matte.css"/>

<link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css"/>
<link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/duotone/style.css"/>
<link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/fill/style.css"/>

<style>
  html, body, #root { height: 100%; margin: 0; padding: 0; }
  body { background: #0a0a0a; }

  /* 지도 모달 — 반경 슬라이더 */
  .bc-map-slider {
    -webkit-appearance: none;
    appearance: none;
    height: 4px;
    border-radius: 999px;
    background: rgba(255,255,255,0.12);
    outline: none;
    cursor: pointer;
  }
  .bc-map-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 16px; height: 16px;
    border-radius: 50%;
    background: #FFFFFF;
    border: 0;
    box-shadow: 0 0 0 2px rgba(13,16,20,0.9), 0 2px 8px rgba(0,0,0,0.5);
    cursor: pointer;
    transition: transform 120ms;
  }
  .bc-map-slider::-webkit-slider-thumb:hover { transform: scale(1.12); }
  .bc-map-slider::-moz-range-thumb {
    width: 16px; height: 16px;
    border-radius: 50%;
    background: #FFFFFF;
    border: 0;
    box-shadow: 0 0 0 2px rgba(13,16,20,0.9), 0 2px 8px rgba(0,0,0,0.5);
    cursor: pointer;
  }
  @keyframes bc-fade-in { from { opacity: 0; } to { opacity: 1; } }
  @keyframes bc-spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <!-- 리포트 캡처 → PDF 저장 (독립 vanilla JS, React 와 분리) -->
  <!-- self-hosted: CDN/CSP 의존 제거. window.html2canvas(pro) / window.jspdf.jsPDF 노출 -->
  <!-- 캡처 엔진: html2canvas-pro (window.html2canvas). 도넛 색/글자 충실도 정확, 전체 ~2.5초. -->
  <!--   로드 순서: 구버전 html2canvas.min.js 보다 뒤에 pro 를 로드해 window.html2canvas 를 덮어쓴다(pro 승). -->
  <!--   modern-screenshot.js 는 더 이상 캡처에 쓰지 않지만 로드는 남겨둔다(무해). -->
  <script src="modern-screenshot.js"></script>
  <script src="html2canvas.min.js"></script>
  <script src="html2canvas-pro.min.js"></script>
  <script src="jspdf.umd.min.js"></script>

  <script type="text/babel" src="lib/director-anim.jsx"></script>
  <script type="text/babel" src="lib/shared.jsx"></script>
  <script type="text/babel" src="lib/charts.jsx"></script>
  <script type="text/babel" src="lib/map-modal.jsx"></script>
  <script type="text/babel" src="lib/search-modal.jsx"></script>
  <script type="text/babel" src="lib/cards-a.jsx"></script>
  <script type="text/babel" src="lib/cards-b.jsx"></script>
  <script type="text/babel" src="lib/cards-c.jsx"></script>
  <script type="text/babel" src="lib/director-modal.jsx"></script>

  <script type="text/babel">
    const { useState, useEffect, useRef, useMemo, useCallback } = React;

    function App() {
      const [active, setActive] = useState("01");
      const [director, setDirector] = useState(false);
      // [2026-05-20] 사이드바 오버레이 구간(≤900px)에서는 기본 닫힘 + 자동 닫힘
      const _isMobile = () => (typeof window !== 'undefined' && window.matchMedia && window.matchMedia('(max-width: 900px)').matches);
      const [sidebarOpen, setSidebarOpen] = useState(() => !_isMobile());
      const [filterCategory, setFilterCategory] = useState(null);
      const [singleCardN, setSingleCardN] = useState(null);   /* ★ 개별 카드 풀스크린 */
      const scrollRef = useRef(null);

      /* sidebar nav (개별 카드 항목) → 그 카드만 풀스크린 모드
         [2026-05-19] 모바일이면 사이드바 자동 닫음 */
      const onNav = useCallback((n) => {
        setActive(n);
        setSingleCardN(prev => prev === n ? null : n);
        setFilterCategory(null);
        if (_isMobile()) setSidebarOpen(false);
        setTimeout(() => scrollRef.current?.scrollTo({top:0, behavior:"instant"}), 30);
      }, []);

      /* 카테고리 클릭: 같은 카테고리면 해제, 다른 거면 전환
         [2026-05-19] 모바일이면 사이드바 자동 닫음 */
      const onCategoryClick = useCallback((catId) => {
        setSingleCardN(null);
        setFilterCategory(prev => {
          if (prev === catId) return null;
          const g = window.GROUPS.find(x => x.id === catId);
          if (g && g.cards.length > 0) setActive(g.cards[0]);
          setTimeout(() => scrollRef.current?.scrollTo({top:0, behavior:"smooth"}), 50);
          return catId;
        });
        if (_isMobile()) setSidebarOpen(false);
      }, []);

      const toggleSidebar = useCallback(() => setSidebarOpen(o => !o), []);
      const clearFilter   = useCallback(() => {
        setFilterCategory(null); setSingleCardN(null);
        if (_isMobile()) setSidebarOpen(false);
      }, []);
      const openDirector  = () => setDirector(true);
      const closeDirector = () => setDirector(false);

      /* Scroll → highlight active sidebar item (전체 모드일 때만) */
      useEffect(() => {
        if (singleCardN || filterCategory) return;
        const ids = window.CARDS.map(c => c.n);
        const els = ids.map(n => document.getElementById(`card-${n}`)).filter(Boolean);
        if (els.length === 0) return;
        const io = new IntersectionObserver((entries) => {
          let best = null, bestRatio = 0;
          for (const e of entries) {
            if (e.isIntersecting && e.intersectionRatio > bestRatio) {
              best = e.target;
              bestRatio = e.intersectionRatio;
            }
          }
          if (best) {
            const n = best.dataset.card || best.id.replace("card-", "");
            setActive(n);
          }
        }, { root: null, threshold: [0.2, 0.4, 0.6], rootMargin: "-80px 0px -50% 0px" });
        els.forEach(el => io.observe(el));
        return () => io.disconnect();
      }, [filterCategory, singleCardN]);

      /* SeqCtx */
      const seqValue = useMemo(() => ({ seq: {}, tab: "main", speed: 1 }), []);

      /* ★ single-card: 가로/세로 둘 다 고려해서 비례 유지로만 fit.
         (이전엔 세로 기준만 잡아 가로로 오버플로우되며 빈영역이 생김) */
      useEffect(() => {
        const root = scrollRef.current;
        if (!singleCardN || !root) {
          root?.querySelector(".bc-card")?.style.removeProperty("--sc-zoom");
          return;
        }
        const fit = () => {
          const card = root.querySelector(".bc-card");
          if (!card) return;
          card.style.setProperty("--sc-zoom", "1");
          requestAnimationFrame(() => {
            const naturalH = card.scrollHeight;
            const naturalW = card.scrollWidth;
            const availH = root.clientHeight;
            const availW = root.clientWidth;
            if (!naturalH || !naturalW) return;
            // 비례 그대로 → 가로/세로 둘 다 viewport 안에 들어오는 한도로만 확대
            const zw = availW / naturalW;
            const zh = availH / naturalH;
            const z = Math.max(1, Math.min(zw, zh, 1.6));
            card.style.setProperty("--sc-zoom", z.toFixed(3));
          });
        };
        fit();
        window.addEventListener("resize", fit);
        return () => window.removeEventListener("resize", fit);
      }, [singleCardN]);

      const visibleCardNums = useMemo(() => {
        if (singleCardN) return [singleCardN];
        if (!filterCategory) return window.CARDS.map(c => c.n);
        const g = window.GROUPS.find(x => x.id === filterCategory);
        return g ? g.cards : window.CARDS.map(c => c.n);
      }, [filterCategory, singleCardN]);

      const filterLabel = singleCardN
        ? (window.CARDS.find(c => c.n === singleCardN)?.title)
        : (filterCategory ? window.GROUPS.find(x => x.id === filterCategory)?.label : null);

      const renderCard = (n) => {
        const Comp = window[`Card${n}`];
        if (!Comp) return null;
        // [bc] window.__BC_DATA__.cards[n-1].body를 카드에 props로 주입
        const idx = parseInt(n, 10) - 1;
        const body = (window.__BC_DATA__ && window.__BC_DATA__.cards && window.__BC_DATA__.cards[idx] && window.__BC_DATA__.cards[idx].body) || {};
        const props = n === "14" ? { onOpenDirector: openDirector, body } : { body };
        return <Comp key={n} {...props}/>;
      };

      // [bc] 부모(영업관리 앱)가 데이터 주입 후 강제 재렌더할 수 있게 훅 등록
      const [, forceTick] = useState(0);
      useEffect(() => {
        window.__bcRender = () => forceTick(t => t + 1);
        return () => { delete window.__bcRender; };
      }, []);

      const filtered = singleCardN || filterCategory;
      const filterClass = filtered ? " filtered filter-" + visibleCardNums.length : "";

      return (
        <window.SeqCtx.Provider value={seqValue}>
          <div
            className={"bc-app" + (sidebarOpen ? " sb-open" : " sb-closed") + filterClass + (singleCardN ? " single-card" : "")}
            onClick={(e) => {
              // [2026-05-19] 모바일에서 사이드바 오버레이 백드롭(::before) 클릭 시 닫음
              // bc-app 자기 자신을 클릭 (자식이 아닌) 했을 때만 처리
              if (_isMobile() && sidebarOpen && e.target === e.currentTarget) setSidebarOpen(false);
            }}
          >
            <div className={"bc-shell " + (sidebarOpen ? "sb-open" : "sb-closed")}>
              <Sidebar
                active={active}
                onNav={onNav}
                onStartTour={openDirector}
                onCategoryClick={onCategoryClick}
                onShowAll={clearFilter}
                isAll={!filterCategory && !singleCardN}
                filterCategory={filterCategory}
                address={(window.__BC_DATA__ && window.__BC_DATA__.address) || ''}
                radius={(window.__BC_DATA__ && window.__BC_DATA__.radius) || undefined}
              />
              <main className="bc-canvas">
                <TopBar
                  address={(window.__BC_DATA__ && window.__BC_DATA__.address) || ''}
                  radius={(window.__BC_DATA__ && window.__BC_DATA__.radius) || undefined}
                  onToggleSidebar={toggleSidebar}
                  sidebarOpen={sidebarOpen}
                  filterLabel={filterLabel}
                  onClearFilter={clearFilter}
                  categories={window.GROUPS}
                  filterCategory={filterCategory}
                  onCategoryClick={onCategoryClick}
                  onShowAll={clearFilter}
                />
                <div ref={scrollRef} className="bc-scroll">
                  {(() => {
                    /* [2026-06-15] 데이터 기준월 캡션 — __BC_DATA__.dataAsOf (top-level 우선, 없으면 summary.dataAsOf).
                       값이 없으면(undefined/빈문자) 캡션 자체를 렌더하지 않는다(빈 캡션 금지). */
                    const _d = window.__BC_DATA__ || {};
                    const _asOf = (typeof _d.dataAsOf === 'string' && _d.dataAsOf.trim())
                      || (_d.summary && typeof _d.summary.dataAsOf === 'string' && _d.summary.dataAsOf.trim())
                      || '';
                    if (!_asOf) return null;
                    return (
                      <div className="bc-dataasof" style={{
                        display:"flex", alignItems:"center", gap:6,
                        padding:"0 4px 10px", margin:"2px 0 0",
                        fontSize:12, color:"var(--matte-fg-4)", fontWeight:500, letterSpacing:"-0.005em"
                      }}>
                        <i className="ph ph-calendar-blank" style={{fontSize:13}}></i>
                        <span>데이터 기준: {_asOf}</span>
                      </div>
                    );
                  })()}
                  {visibleCardNums.map(renderCard)}
                </div>
              </main>
            </div>
            <DirectorModal open={director} onClose={closeDirector}/>
            <window.SearchModalHost/>
          </div>
        </window.SeqCtx.Provider>
      );
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>

  <!-- ============================================================
       리포트 캡처 → PDF 저장 기능 (React 와 완전 분리된 vanilla JS)
       - 좌상단 고정 흰색 "캡처" 버튼
       - 카드 선택 모달(전체선택 토글 + 카드별 체크박스)
       - 선택 카드를 html2canvas-pro 캡처 → jsPDF 로 카드당 1페이지 PDF 저장
       - 카드 식별: 리포트 각 섹션의 data-card / data-screen-label 속성
       ============================================================ -->
  <style>
    #bc-cap-btn{
      position:fixed; top:14px; left:14px; z-index:99000;
      display:inline-flex; align-items:center; gap:6px;
      padding:8px 12px; border-radius:10px;
      background:#FFFFFF; color:#191F28;
      border:1px solid rgba(0,0,0,0.08);
      box-shadow:0 2px 12px rgba(0,0,0,0.28);
      font-size:13px; font-weight:700; line-height:1; cursor:pointer;
      font-family:Pretendard,-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Malgun Gothic",sans-serif;
      -webkit-tap-highlight-color:transparent;
    }
    #bc-cap-btn:hover{ background:#F2F4F6; }
    #bc-cap-btn svg{ display:block; }

    #bc-cap-overlay{
      position:fixed; inset:0; z-index:99001;
      background:rgba(0,0,0,0.58);
      display:none; align-items:center; justify-content:center;
      padding:16px;
      font-family:Pretendard,-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Malgun Gothic",sans-serif;
    }
    #bc-cap-overlay.open{ display:flex; }
    .bc-cap-panel{
      width:100%; max-width:400px; max-height:84vh;
      display:flex; flex-direction:column;
      background:#16161B; color:#ECECEF;
      border:1px solid rgba(255,255,255,0.10);
      border-radius:16px;
      box-shadow:0 18px 50px rgba(0,0,0,0.55);
      overflow:hidden;
    }
    .bc-cap-head{ padding:16px 18px 12px; border-bottom:1px solid rgba(255,255,255,0.08); }
    .bc-cap-head h3{ margin:0; font-size:16px; font-weight:800; color:#F4F4F6; }
    .bc-cap-head p{ margin:4px 0 0; font-size:12px; color:#9A9AA3; line-height:1.5; }
    .bc-cap-allrow{
      display:flex; align-items:center; gap:10px;
      padding:12px 18px; cursor:pointer;
      border-bottom:1px solid rgba(255,255,255,0.08);
      user-select:none;
    }
    .bc-cap-allrow .bc-cap-alllabel{ font-size:14px; font-weight:700; color:#F4F4F6; }
    .bc-cap-allrow .bc-cap-allcount{ margin-left:auto; font-size:12px; color:#9A9AA3; }
    .bc-cap-list{ overflow-y:auto; overflow-x:hidden; padding:6px 0; flex:1; }
    .bc-cap-item{
      display:flex; align-items:center; gap:10px; box-sizing:border-box;
      width:100%; padding:10px 18px; cursor:pointer; user-select:none;
    }
    .bc-cap-item:hover{ background:rgba(255,255,255,0.03); }
    .bc-cap-item span.bc-cap-lbl{ font-size:14px; color:#ECECEF; line-height:1.4; }
    .bc-cap-empty{ padding:22px 18px; font-size:13px; color:#9A9AA3; text-align:center; }
    .bc-cap-chk{
      width:20px; height:20px; flex-shrink:0; border-radius:6px;
      display:inline-flex; align-items:center; justify-content:center;
      border:1px solid rgba(255,255,255,0.25); background:transparent;
      transition:background .15s, border-color .15s;
    }
    .bc-cap-chk.on{ background:#3182F6; border-color:#3182F6; }
    .bc-cap-chk svg{ display:none; }
    .bc-cap-chk.on svg{ display:block; }
    .bc-cap-foot{ display:flex; gap:8px; padding:14px; border-top:1px solid rgba(255,255,255,0.08); }
    .bc-cap-foot button{
      border:none; border-radius:10px; font-size:14px; cursor:pointer;
      font-family:inherit; padding:12px 0;
    }
    .bc-cap-cancel{ flex:1; background:rgba(255,255,255,0.06); color:#ECECEF; font-weight:600; }
    .bc-cap-confirm{ flex:2; background:#3182F6; color:#FFFFFF; font-weight:700; }
    /* JPG 저장: PDF 버튼과 톤은 맞추되 보조(외곽선) 스타일로 구분 */
    .bc-cap-confirm-jpg{ flex:2; background:transparent; color:#3182F6; font-weight:700; box-shadow:inset 0 0 0 1.5px #3182F6; }
    .bc-cap-foot button:disabled{ opacity:.55; cursor:default; }
    .bc-cap-progress{ padding:0 18px 4px; }
    .bc-cap-bar{ height:4px; border-radius:2px; background:rgba(255,255,255,0.08); overflow:hidden; margin-top:8px; }
    .bc-cap-bar > i{ display:block; height:100%; width:0%; background:#3182F6; transition:width .2s; }
    .bc-cap-note{ margin:6px 0 0; font-size:12px; color:#9A9AA3; }
    .bc-cap-err{ margin:8px 0 0; font-size:12px; color:#F87171; line-height:1.5; }
    .bc-cap-hidden{ visibility:hidden !important; }
  </style>

  <script>
  (function(){
    "use strict";

    // 라이브러리 로드 확인 (로드 실패 시 버튼만 안 띄움)
    //   캡처 엔진: html2canvas-pro → window.html2canvas(함수) 사용.
    function libsReady(){
      var jspdf = window.jspdf || window.jsPDF;
      return typeof window.html2canvas === "function" &&
             jspdf && (jspdf.jsPDF || jspdf.default || typeof jspdf === "function");
    }
    function getJsPDF(){
      var m = window.jspdf || window.jsPDF;
      if (!m) return null;
      return m.jsPDF || m.default || m;
    }

    function todayStamp(){
      var d = new Date();
      var y = d.getFullYear();
      var mo = String(d.getMonth()+1).padStart(2,"0");
      var da = String(d.getDate()).padStart(2,"0");
      return "" + y + mo + da;
    }
    function wait(ms){ return new Promise(function(r){ setTimeout(r, ms); }); }

    // data-screen-label 앞쪽 번호("01".."14") 추출 → 화면 위→아래(=badge) 순 정렬 키
    function labelOrderKey(el, domIndex){
      var lab = el.getAttribute("data-screen-label") || "";
      var m = lab.match(/\d+/);
      if (m) return parseInt(m[0], 10);
      // 라벨에 번호가 없으면 DOM 순서로 폴백
      return 1000 + domIndex;
    }

    // 현재 DOM 의 카드 수집 (보이는 순서대로 정렬)
    function collectCards(){
      var nodes = Array.prototype.slice.call(document.querySelectorAll("[data-card]"));
      var mapped = nodes.map(function(el, i){
        return {
          el: el,
          id: el.getAttribute("data-card") || String(i+1),
          label: (el.getAttribute("data-screen-label") || ("카드 " + (i+1))).trim(),
          ord: labelOrderKey(el, i),
          dom: i
        };
      });
      mapped.sort(function(a,b){
        if (a.ord !== b.ord) return a.ord - b.ord;
        return a.dom - b.dom;
      });
      return mapped;
    }

    // 필터/단일카드 모드면 전체 14장이 DOM 에 없을 수 있음 → "전체 보고서" 클릭해 모두 펼침
    function ensureAllCardsRendered(){
      try {
        var present = document.querySelectorAll("[data-card]").length;
        if (present >= 14) return Promise.resolve();
        var cats = document.querySelectorAll(".bc-cat");
        for (var i=0;i<cats.length;i++){
          var t = (cats[i].textContent || "");
          if (t.indexOf("전체 보고서") !== -1){
            cats[i].click();
            return wait(260);
          }
        }
      } catch(_){}
      return Promise.resolve();
    }

    // ── DOM 빌드 ──
    var btn = document.createElement("button");
    btn.id = "bc-cap-btn";
    btn.type = "button";
    btn.setAttribute("aria-label", "리포트 캡처");
    btn.innerHTML =
      '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">' +
        '<path d="M4 8.5A2.5 2.5 0 0 1 6.5 6h1.05c.5 0 .96-.27 1.2-.71l.5-.93C9.7 3.9 10.16 3.6 10.7 3.6h2.6c.54 0 1 .3 1.25.76l.5.93c.24.44.7.71 1.2.71h1.05A2.5 2.5 0 0 1 20 8.5v8A2.5 2.5 0 0 1 17.5 19h-11A2.5 2.5 0 0 1 4 16.5v-8Z" stroke="#191F28" stroke-width="1.6"/>' +
        '<circle cx="12" cy="12.5" r="3.2" stroke="#191F28" stroke-width="1.6"/>' +
      '</svg>' +
      '<span>캡처</span>';

    var overlay = document.createElement("div");
    overlay.id = "bc-cap-overlay";
    overlay.innerHTML =
      '<div class="bc-cap-panel" role="dialog" aria-modal="true">' +
        '<div class="bc-cap-head">' +
          '<h3>PDF로 저장할 카드 선택</h3>' +
          '<p>선택한 카드가 한 장씩 PDF로 저장됩니다</p>' +
        '</div>' +
        '<div class="bc-cap-allrow" data-cap-all>' +
          '<span class="bc-cap-chk" data-cap-allchk>' + checkSvg() + '</span>' +
          '<span class="bc-cap-alllabel">전체 선택</span>' +
          '<span class="bc-cap-allcount" data-cap-allcount></span>' +
        '</div>' +
        '<div class="bc-cap-list" data-cap-list></div>' +
        '<div class="bc-cap-progress" data-cap-progress style="display:none;">' +
          '<div class="bc-cap-bar"><i data-cap-barfill></i></div>' +
          '<p class="bc-cap-note" data-cap-note>PDF 만드는 중…</p>' +
        '</div>' +
        '<p class="bc-cap-err" data-cap-err style="display:none;"></p>' +
        '<div class="bc-cap-foot">' +
          '<button type="button" class="bc-cap-cancel" data-cap-cancel>취소</button>' +
          '<button type="button" class="bc-cap-confirm" data-cap-confirm>PDF 저장</button>' +
          '<button type="button" class="bc-cap-confirm bc-cap-confirm-jpg" data-cap-confirm-jpg>JPG 저장</button>' +
        '</div>' +
      '</div>';

    function checkSvg(){
      return '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">' +
             '<path d="M5 12.5l4.5 4.5L19 7.5" stroke="#FFFFFF" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/></svg>';
    }

    function mount(){
      // [캡처 툴바 이동] 좌상단 고정 버튼은 숨긴다(로직/모달은 그대로 둠).
      //   캡처는 이제 툴바의 카메라 아이콘(window.__bcOpenCapture)으로 연다.
      btn.style.display = "none";
      document.body.appendChild(btn);
      document.body.appendChild(overlay);
    }
    if (document.body) mount(); else document.addEventListener("DOMContentLoaded", mount);

    // ── 상태 ──
    var cards = [];                 // [{el,id,label,...}]
    var checked = {};               // { id:true }
    var busy = false;

    var listEl    = overlay.querySelector("[data-cap-list]");
    var allRow    = overlay.querySelector("[data-cap-all]");
    var allChk    = overlay.querySelector("[data-cap-allchk]");
    var allCount  = overlay.querySelector("[data-cap-allcount]");
    var cancelBtn = overlay.querySelector("[data-cap-cancel]");
    var confirmBtn= overlay.querySelector("[data-cap-confirm]");
    var confirmJpgBtn = overlay.querySelector("[data-cap-confirm-jpg]");
    var progress  = overlay.querySelector("[data-cap-progress]");
    var barFill   = overlay.querySelector("[data-cap-barfill]");
    var noteEl    = overlay.querySelector("[data-cap-note]");
    var errEl     = overlay.querySelector("[data-cap-err]");

    function allOn(){ return cards.length > 0 && cards.every(function(c){ return checked[c.id]; }); }

    function renderList(){
      allCount.textContent = cards.length + "개";
      allChk.className = "bc-cap-chk" + (allOn() ? " on" : "");
      listEl.innerHTML = "";
      if (cards.length === 0){
        var em = document.createElement("p");
        em.className = "bc-cap-empty";
        em.textContent = "캡처할 카드를 찾지 못했습니다";
        listEl.appendChild(em);
        return;
      }
      cards.forEach(function(c){
        var row = document.createElement("div");
        row.className = "bc-cap-item";
        row.innerHTML = '<span class="bc-cap-chk' + (checked[c.id] ? " on" : "") + '">' + checkSvg() + '</span>' +
                        '<span class="bc-cap-lbl"></span>';
        row.querySelector(".bc-cap-lbl").textContent = c.label;
        row.addEventListener("click", function(){
          if (busy) return;
          checked[c.id] = !checked[c.id];
          renderList();
        });
        listEl.appendChild(row);
      });
    }

    function showErr(msg){
      if (msg){ errEl.style.display = "block"; errEl.textContent = msg; }
      else { errEl.style.display = "none"; errEl.textContent = ""; }
    }
    function setProgress(pct, text){
      progress.style.display = "block";
      barFill.style.width = pct + "%";
      noteEl.textContent = text || ("PDF 만드는 중… " + pct + "%");
    }
    function hideProgress(){ progress.style.display = "none"; barFill.style.width = "0%"; }

    // 어떤 저장 경로가 진행 중인지: "pdf" | "jpg" | null. 버튼 텍스트 복구/진행표시 분기에 사용.
    var busyMode = null;
    function setBusy(b, mode){
      busy = b;
      if (b) busyMode = mode || "pdf";
      cancelBtn.disabled = b;
      confirmBtn.disabled = b;
      if (confirmJpgBtn) confirmJpgBtn.disabled = b;
      if (b){
        // 진행 중인 버튼에만 "저장 중…", 나머지는 원래 텍스트 유지
        if (busyMode === "jpg"){
          if (confirmJpgBtn) confirmJpgBtn.textContent = "저장 중…";
        } else {
          confirmBtn.textContent = "저장 중…";
        }
      } else {
        // 두 버튼 텍스트 모두 원래대로 복구
        confirmBtn.textContent = "PDF 저장";
        if (confirmJpgBtn) confirmJpgBtn.textContent = "JPG 저장";
        busyMode = null;
      }
    }
    // 저장 중 버튼 텍스트에 진행 상황 표시: "저장 중… (3/14)" (진행 중인 버튼에만)
    function setBusyProgress(done, total){
      var txt = "저장 중… (" + done + "/" + total + ")";
      if (busyMode === "jpg"){
        if (confirmJpgBtn) confirmJpgBtn.textContent = txt;
      } else {
        confirmBtn.textContent = txt;
      }
    }

    // html2canvas 가 캡처 도중 멈추면, 복제 작업용으로 body 끝에 붙여둔 iframe/컨테이너가
    //   문서에 남아 다음 캡처를 방해할 수 있다 → 잔여 흔적을 모두 제거한다.
    //   (워치독 타임아웃은 이제 컨테이너 1회 캡처에만 붙는다 → runCapture 내부 captureContainerOnce 참고)
    function purgeHtml2canvasArtifacts(){
      try {
        var sel = 'iframe.html2canvas-container,' +
                  '[data-html2canvas-clone],' +
                  '[data-html2canvas-ignore],' +
                  'iframe[style*="-10000px"]';
        var nodes = document.querySelectorAll(sel);
        for (var i = 0; i < nodes.length; i++){
          var n = nodes[i];
          // 캡처 버튼/모달은 data-html2canvas-ignore 없이도 보호 (혹시 모를 오매칭 방지)
          if (n === btn || n === overlay) continue;
          if (n.parentNode) n.parentNode.removeChild(n);
        }
        // 클래스명이 바뀐 버전 대비: 화면 밖(-10000px)으로 밀어둔 떠돌이 iframe 정리
        var iframes = document.querySelectorAll("iframe");
        for (var j = 0; j < iframes.length; j++){
          var f = iframes[j];
          var st = (f.getAttribute("style") || "");
          var cls = (f.className || "");
          if ((cls.indexOf("html2canvas") !== -1) ||
              (st.indexOf("-10000px") !== -1 && f.getAttribute("data-bc-keep") == null)){
            if (f.parentNode) f.parentNode.removeChild(f);
          }
        }
      } catch(_){}
    }

    function openModal(){
      showErr("");
      hideProgress();
      setBusy(false);
      // 전체 14장이 안 떠 있으면 펼친 뒤 수집
      ensureAllCardsRendered().then(function(){
        cards = collectCards();
        checked = {};
        cards.forEach(function(c){ checked[c.id] = true; });   // 기본 전체 선택
        renderList();
        overlay.classList.add("open");
      });
    }
    function closeModal(){ if (!busy) overlay.classList.remove("open"); }

    // [캡처 툴바 이동] 툴바의 카메라 아이콘에서 호출할 수 있게 전역 노출
    try { window.__bcOpenCapture = openModal; } catch(e){}

    btn.addEventListener("click", openModal);
    cancelBtn.addEventListener("click", closeModal);
    overlay.addEventListener("click", function(e){ if (e.target === overlay) closeModal(); });
    allRow.addEventListener("click", function(){
      if (busy) return;
      var turnOn = !allOn();
      cards.forEach(function(c){ checked[c.id] = turnOn; });
      renderList();
    });

    confirmBtn.addEventListener("click", function(){ runCapture(); });
    if (confirmJpgBtn) confirmJpgBtn.addEventListener("click", function(){ runCaptureJpg(); });

    // ── 캡처 방식: 14개 카드를 감싸는 공통 컨테이너를 "단 한 번"만 html2canvas-pro 로 뜬 뒤,
    //    그 큰 캔버스를 카드 경계로 잘라 카드당 1페이지 PDF 를 만든다.
    //    (이전엔 카드마다 따로 떠서 폰트/스타일/리소스를 14번 다시 로드 → 5~10분.
    //     이제 캡처 1회로 끝나 훨씬 빠르다. html2canvas-pro 는 전체 ~2.5초 + 도넛 색/글자 충실도 정확.)

    // 모든 [data-card] 의 공통 조상(LCA)을 계산한다.
    //   대개 .bc-scroll 한 개지만, DOM 이 바뀌어도 안전하도록 직접 가장 가까운 공통 부모를 찾는다.
    function findCommonContainer(els){
      if (!els || els.length === 0) return null;
      if (els.length === 1) return els[0].parentNode || els[0];
      // 첫 요소의 조상 사슬(자기 자신 포함, 위로 document 까지)
      var chain = [];
      var p = els[0];
      while (p){ chain.push(p); p = p.parentNode; }
      // 나머지 요소들에 대해, chain 에서 그 요소를 포함하는 가장 깊은(=인덱스 작은) 노드로 좁힌다.
      var lcaIdx = 0; // chain[0] = els[0] 자신
      for (var i = 1; i < els.length; i++){
        var node = els[i];
        var idx = -1;
        // node 의 조상을 위로 올라가며 chain 안에서 처음 만나는 지점
        var q = node;
        while (q){
          var pos = chain.indexOf(q);
          if (pos !== -1){ idx = pos; break; }
          q = q.parentNode;
        }
        if (idx === -1) return document.body; // 공통 조상이 없으면(이론상) body 폴백
        if (idx > lcaIdx) lcaIdx = idx;       // 더 위(더 큰 인덱스)로 끌어올림
      }
      return chain[lcaIdx] || document.body;
    }

    function runCapture(){
      if (busy) return;
      if (!libsReady()){
        showErr("PDF 라이브러리를 불러오지 못했습니다. 새로고침 후 다시 시도해 주세요.");
        return;
      }
      var selected = cards.filter(function(c){ return checked[c.id]; });
      if (selected.length === 0){
        showErr("한 개 이상 선택해 주세요.");
        return;
      }
      showErr("");
      setBusy(true);
      setProgress(0, "PDF 만드는 중… 0%");

      // 캡처 중 버튼/모달이 스크린샷에 안 찍히도록 숨김
      btn.classList.add("bc-cap-hidden");
      overlay.classList.add("bc-cap-hidden");

      var JsPDF = getJsPDF();
      // 페이지 크기를 A4 로 고정하지 않는다. 카드(잘라낸 캔버스)마다 자기 비율 그대로의
      //   맞춤 페이지를 만들어 이미지를 페이지 가득 그린다 → 찌그러짐/왜곡 없음.
      var pdf = null;
      var bg = "#0a0a0a";   // 리포트 다크 배경
      var pageCount = 0;

      // 잘라낸 canvas 1장을 그 비율 그대로 PDF 1페이지로 추가
      function addImagePage(canvas){
        var imgW = canvas.width, imgH = canvas.height;
        if (!imgW || !imgH) return false;
        var orient = imgW >= imgH ? "landscape" : "portrait";
        if (!pdf){
          pdf = new JsPDF({ unit:"px", format:[imgW, imgH], orientation:orient, compress:true });
        } else {
          pdf.addPage([imgW, imgH], orient);
        }
        pdf.setFillColor(bg);
        pdf.rect(0, 0, imgW, imgH, "F");
        var imgData = canvas.toDataURL("image/jpeg", 0.92);
        pdf.addImage(imgData, "JPEG", 0, 0, imgW, imgH, undefined, "FAST");
        pageCount++;
        return true;
      }

      // 캡처 대상(컨테이너) 1회용 html2canvas-pro 옵션. (scale 만 재시도 때 낮춰 재사용)
      //   captureEl = 캡처 대상 컨테이너(원본), captureScale = 렌더 배율.
      //
      //   ※ onclone 에서 "두 가지"를 함께 한다. (라이브 PDF 검수로 확정된 트레이드오프)
      //     (1) 애니메이션/트랜지션 끄기:
      //         AI 종합(카드14)의 긍정/부정 시그널 박스는 페이드인(opacity 0→1) 애니메이션이라,
      //         복제본에서 애니메이션을 끄지 않으면 캡처 시점에 opacity:0(빈 칸)으로 잡힌다.
      //         그래서 복제 문서에 animation/transition:none 을 주입해 최종상태(opacity:1)로 고정한다.
      //     (2) SVG 차트의 최종 stroke/fill 복사:
      //         카드1 도넛("카페 비율")·카드10 반원 게이지의 색 아크는 stroke-dashoffset 애니메이션으로 그린다.
      //         애니메이션을 끄면(=위 (1)) 복제본 아크가 시작상태(회색 트랙)로 되돌아가 색이 사라진다.
      //         이를 막으려고, 원본의 라이브 최종값(getComputedStyle: stroke/strokeDasharray/
      //         strokeDashoffset/fill/strokeWidth/opacity)을 복제 도형에 inline 으로 박아 색 아크를 고정한다.
      //         → SVG 도형(circle/path/ellipse/rect/line/polyline/polygon)만 순회하므로 빠르다.
      //           (절대 "모든 요소" 로 확대 금지 — 과거 150초짜리 회귀의 원인.)
      //   ※ 원본 컨테이너 참조: buildOpts 의 인자 captureEl 이 곧 원본 컨테이너다(클로저로 onclone 에서 사용).
      //     clonedEl 은 captureEl 의 복제본(html2canvas onclone 시그니처: onclone(clonedDoc, clonedEl)).
      //   ※ [중요] .bc-scroll 은 overflow-y:auto 인 스크롤 컨테이너라, getBoundingClientRect().height 는
      //      "보이는 뷰포트 높이"뿐이다. 14장 전체를 떠야 하므로 width/height 를 scrollWidth/scrollHeight 로
      //      명시 지정한다.

      // onclone 에서 색 아크 복원에 쓸 SVG 도형 셀렉터 (도형 요소만 — 전체 요소 순회 금지).
      var SVG_SHAPE_SEL = "circle,path,ellipse,rect,line,polyline,polygon";
      // 원본 도형 → 복제 도형으로 옮길, 애니메이션이 끝난 최종 표현 속성들.
      var SVG_COPY_PROPS = ["stroke", "strokeDasharray", "strokeDashoffset", "fill", "strokeWidth", "opacity"];

      function buildOpts(captureEl, captureScale){
        var fullW = (captureEl && (captureEl.scrollWidth || captureEl.getBoundingClientRect().width)) || 0;
        var fullH = (captureEl && (captureEl.scrollHeight || captureEl.getBoundingClientRect().height)) || 0;
        return {
          backgroundColor: bg,
          scale: captureScale,
          width: fullW,
          height: fullH,
          useCORS: true,
          logging: false,
          // 원본 컨테이너(captureEl)는 클로저로 캡처되어 여기서 그대로 쓴다.
          onclone: function(clonedDoc, clonedEl){
            try {
              // (1) 복제 문서 전체의 애니메이션/트랜지션을 끈다 → 페이드인 요소(시그널)를 최종상태로.
              try {
                var st = clonedDoc.createElement("style");
                st.setAttribute("data-bc-cap-disable-anim", "1");
                st.appendChild(clonedDoc.createTextNode(
                  "*{animation:none !important;transition:none !important;animation-duration:0s !important;}"
                ));
                (clonedDoc.head || clonedDoc.documentElement || clonedEl).appendChild(st);
              } catch (e1) {
                try { if (window.console && console.warn) console.warn("[CAP onclone disable-anim 실패]", e1); } catch(_){}
              }

              // (2) 원본 SVG 도형의 라이브 최종 stroke/fill 값을 복제 도형에 inline 으로 복사.
              //     원본 컨테이너(captureEl)와 복제 루트(clonedEl)에서 같은 셀렉터로 도형을 뽑아 인덱스 매칭.
              try {
                var origRoot = captureEl;
                if (origRoot && clonedEl) {
                  var win = (origRoot.ownerDocument && origRoot.ownerDocument.defaultView) || window;
                  var origShapes  = origRoot.querySelectorAll(SVG_SHAPE_SEL);
                  var cloneShapes = clonedEl.querySelectorAll(SVG_SHAPE_SEL);
                  var n = Math.min(origShapes.length, cloneShapes.length);
                  for (var i = 0; i < n; i++) {
                    var os = origShapes[i], cs = cloneShapes[i];
                    if (!os || !cs) continue;
                    var cssOrig;
                    try { cssOrig = win.getComputedStyle(os); } catch(_){ cssOrig = null; }
                    if (!cssOrig) continue;
                    for (var k = 0; k < SVG_COPY_PROPS.length; k++) {
                      var prop = SVG_COPY_PROPS[k];
                      var val = cssOrig[prop];
                      // 값이 있을 때만 박는다 (빈 문자열/null/"none" 의 stroke 등은 건너뜀은 아래에서 처리)
                      if (val === undefined || val === null || val === "") continue;
                      // "none" 인 fill/stroke 는 원본 의도이므로 그대로 박는다(색 아크 트랙이 fill:none 인 경우 등).
                      try { cs.style[prop] = val; } catch(_){}
                    }
                  }
                }
              } catch (e2) {
                try { if (window.console && console.warn) console.warn("[CAP onclone SVG 복사 실패]", e2); } catch(_){}
              }
            } catch (eAll) {
              try { if (window.console && console.warn) console.warn("[CAP onclone 전체 실패]", eAll); } catch(_){}
            }
          }
        };
      }

      // Blob → 임시 <a download> 클릭으로 직접 다운로드 (jsPDF 내부 saveAs 해석에 의존하지 않음).
      //   pdf.save() 가 (1) 예외를 던지거나 (2) 내부 saveAs 가 no-op 으로 풀려 조용히 아무것도
      //   안 받아오는 회귀 상황 모두를 막는다. 성공/실패를 콘솔에 반드시 남긴다.
      function downloadViaBlob(name){
        try {
          var blob = pdf.output("blob");
          var url = (window.URL || window.webkitURL).createObjectURL(blob);
          var a = document.createElement("a");
          a.href = url;
          a.download = name;
          a.rel = "noopener";
          a.style.display = "none";
          document.body.appendChild(a);
          a.click();
          setTimeout(function(){
            try { if (a.parentNode) a.parentNode.removeChild(a); } catch(_){}
            try { (window.URL || window.webkitURL).revokeObjectURL(url); } catch(_){}
          }, 40000);
          console.log("[CAP] saved OK (blob)");
          return true;
        } catch (e){
          console.error("[CAP] blob fallback failed", e);
          return false;
        }
      }

      function finish(){
        btn.classList.remove("bc-cap-hidden");
        overlay.classList.remove("bc-cap-hidden");
        setBusy(false);
        hideProgress();
        // 성공한 페이지가 한 장도 없으면 다운로드 없이 오류만 표시
        if (pageCount === 0 || !pdf){
          showErr("캡처에 실패했습니다. 다시 시도해 주세요.");
          return;
        }

        // 완주 후 저장은 반드시 1회 호출된다 (이 분기 누락이 회귀 원인이었음).
        var fileName = "빈크래프트_상권분석_" + todayStamp() + ".pdf";
        var savedOK = false;
        try {
          console.log("[CAP] saving pages=", pdf.getNumberOfPages());
        } catch(_){}

        // 1차: Blob → <a download> 직접 다운로드 (가장 확실한 경로)
        savedOK = downloadViaBlob(fileName);

        // 2차(폴백): Blob 경로가 실패하면 jsPDF 기본 save() 를 시도
        if (!savedOK){
          try {
            pdf.save(fileName);
            console.log("[CAP] saved OK (pdf.save)");
            savedOK = true;
          } catch (e){
            console.error("[CAP] save failed", e);
          }
        }

        if (!savedOK){
          showErr("PDF 저장에 실패했습니다. 새로고침 후 다시 시도해 주세요.");
          return;
        }

        overlay.classList.remove("open");
      }

      // 큰 캔버스(big)를 받아 선택된 카드들을 경계로 잘라 페이지로 채운다.
      //   effScale = big 캔버스가 실제로 떠진 배율 (컨테이너 좌표 → 캔버스 픽셀 변환에 사용)
      function sliceAndBuild(big, container, effScale){
        // 컨테이너 기준 좌표 계산용 기준점 (스크롤 보정 포함: getBoundingClientRect 는 뷰포트 기준이라
        //   컨테이너/카드 모두 동일 뷰포트 기준이므로 그 차이(rel)만 쓰면 스크롤 영향은 상쇄된다)
        var contRect = container.getBoundingClientRect();
        var bigW = big.width;     // = round(container 가시폭 * effScale) 수준
        var bigH = big.height;

        var total = selected.length;
        for (var i = 0; i < total; i++){
          var card = selected[i];
          var el = card.el;

          var pct = Math.round((i / total) * 100);
          setProgress(pct, "저장 중… (" + (i + 1) + "/" + total + ")");
          setBusyProgress(i + 1, total);

          if (!el || !document.body.contains(el)) continue;

          var r = el.getBoundingClientRect();
          // 카드의 실제 bounding box(margin 제외) 기준 상대좌표
          var relTop = r.top - contRect.top;     // 컨테이너 상단 기준 카드 상단
          var srcY = Math.round(relTop * effScale);
          var srcH = Math.round(r.height * effScale);

          // 캔버스 경계로 클램프 (잘림/오버런 방지)
          if (srcY < 0) { srcH += srcY; srcY = 0; }
          if (srcY > bigH) continue;
          if (srcY + srcH > bigH) srcH = bigH - srcY;
          if (srcH <= 0) continue;

          // 카드용 임시 캔버스: 폭=큰 캔버스 폭 전체, 높이=srcH
          var tmp = document.createElement("canvas");
          tmp.width = bigW;
          tmp.height = srcH;
          var ctx = tmp.getContext("2d");
          // 배경 먼저 채워 투명/검정 줄 방지
          ctx.fillStyle = bg;
          ctx.fillRect(0, 0, bigW, srcH);
          // big 의 [0, srcY] ~ [bigW, srcY+srcH] 영역을 그대로 복사
          ctx.drawImage(big, 0, srcY, bigW, srcH, 0, 0, bigW, srcH);

          addImagePage(tmp);
          // 임시 캔버스 메모리 회수 힌트
          tmp.width = tmp.height = 0;
        }
        finish();
      }

      // ── 큰 컨테이너를 단 한 번만 캡처 → 워치독(타임아웃)과 경쟁 → 실패 시 scale 낮춰 1회 재시도 ──
      var CONTAINER_TIMEOUT_MS = 30000;   // html2canvas-pro 는 전체 ~2.5초. 30초면 충분한 안전망.
      var maxH = 30000;   // 캔버스 높이 한계: 이걸 넘으면 일부 브라우저에서 캡처 실패
      var baseScale = 1.0;   // html2canvas-pro 기본 배율 1.0 (긴 컨테이너는 maxH 한도로 자동 축소)

      // 1회 캡처: 컨테이너 높이에 따라 scale 을 자동으로 낮춰 캔버스 높이가 maxH 이하가 되게 한다.
      function captureContainerOnce(container, scaleCap, label){
        var sh = container.scrollHeight || container.getBoundingClientRect().height || 1;
        var effScale = Math.min(scaleCap, maxH / sh);
        if (!isFinite(effScale) || effScale <= 0) effScale = scaleCap;
        try { console.log("[CAP] capture container", label, "scrollH=", sh, "effScale=", effScale.toFixed(3)); } catch(_){}

        var t, timedOut = false;
        var timeoutP = new Promise(function(_, reject){
          t = setTimeout(function(){
            timedOut = true;
            purgeHtml2canvasArtifacts();
            reject(new Error("container-timeout"));
          }, CONTAINER_TIMEOUT_MS);
        });
        // 캡처 엔진: html2canvas-pro → window.html2canvas(컨테이너, 옵션). Promise<canvas> 반환.
        var capP = window.html2canvas(container, buildOpts(container, effScale));
        return Promise.race([ capP, timeoutP ]).then(function(canvas){
          clearTimeout(t);
          return { canvas: canvas, effScale: effScale };
        }).catch(function(err){
          clearTimeout(t);
          if (timedOut) purgeHtml2canvasArtifacts();
          throw err;
        });
      }

      function failHard(){
        purgeHtml2canvasArtifacts();
        btn.classList.remove("bc-cap-hidden");
        overlay.classList.remove("bc-cap-hidden");
        setBusy(false);
        hideProgress();
        showErr("캡처에 실패했습니다. 잠시 후 다시 시도해 주세요.");
      }

      function startCaptureFlow(){
        var els = selected.map(function(c){ return c.el; }).filter(Boolean);
        var container = findCommonContainer(els);
        if (!container){ failHard(); return; }
        try { console.log("[CAP] common container =", container.className || container.tagName); } catch(_){}

        // 잘라낼 좌표가 정확하도록 컨테이너 맨 위로 스크롤(보정은 rel 차이로 상쇄되지만 안전하게)
        try { container.scrollTo ? container.scrollTo({top:0, behavior:"auto"}) : (container.scrollTop = 0); } catch(_){}

        setProgress(5, "캡처 준비 중…");
        // 안정화를 위해 한 박자 양보 (비동기 Babel 렌더/지연 차트)
        wait(500).then(function(){
          setProgress(15, "캡처 중…");
          captureContainerOnce(container, baseScale, "1차").then(function(res){
            if (!res.canvas || !res.canvas.width || !res.canvas.height){
              throw new Error("empty-container-canvas");
            }
            sliceAndBuild(res.canvas, container, res.effScale);
          }).catch(function(err){
            if (window.console && console.warn) console.warn("[CAP 컨테이너 1차 실패→재시도]", err);
            purgeHtml2canvasArtifacts();
            // scale 더 낮춰 1회 재시도 (절반)
            wait(150).then(function(){
              captureContainerOnce(container, Math.max(1, baseScale * 0.6), "재시도").then(function(res2){
                if (!res2.canvas || !res2.canvas.width || !res2.canvas.height){
                  throw new Error("empty-container-canvas-retry");
                }
                sliceAndBuild(res2.canvas, container, res2.effScale);
              }).catch(function(err2){
                if (window.console && console.warn) console.warn("[CAP 컨테이너 재시도도 실패]", err2);
                failHard();
              });
            });
          });
        });
      }

      // 웹폰트가 다 준비된 뒤 캡처를 시작한다 (폰트 미로딩으로 글자가 비거나 깨지는 것 방지).
      var fontsReady = (document.fonts && document.fonts.ready) ? document.fonts.ready : Promise.resolve();
      Promise.resolve(fontsReady).then(startCaptureFlow, startCaptureFlow);
    }

    // ── JPG 저장 ──────────────────────────────────────────────────────────────
    //   PDF 와 동일하게: 카드 선택을 존중하고, .bc-scroll 컨테이너를 html2canvas-pro 로 단 한 번만
    //   떠서(captureContainerOnce) 큰 canvas 를 만든 뒤, 선택된 카드 영역만 잘라 세로로 이어붙여
    //   "단일 canvas" 를 만든다 → 그 canvas 를 JPEG 로 export 해 한 장으로 저장한다.
    //   (PDF 의 sliceAndBuild 자르기 로직을 그대로 참고하되, 페이지로 나누지 않고 한 canvas 에 누적한다.)
    function runCaptureJpg(){
      if (busy) return;
      // JPG 는 jsPDF 가 필요 없다 → html2canvas 만 있으면 된다.
      if (typeof window.html2canvas !== "function"){
        showErr("캡처 라이브러리를 불러오지 못했습니다. 새로고침 후 다시 시도해 주세요.");
        return;
      }
      var selected = cards.filter(function(c){ return checked[c.id]; });
      if (selected.length === 0){
        showErr("한 개 이상 선택해 주세요.");
        return;
      }
      showErr("");
      setBusy(true, "jpg");
      setProgress(0, "JPG 만드는 중… 0%");

      // 캡처 중 버튼/모달이 스크린샷에 안 찍히도록 숨김
      btn.classList.add("bc-cap-hidden");
      overlay.classList.add("bc-cap-hidden");

      var bg = "#0a0a0a";        // 리포트 다크 배경 (PDF 와 동일)
      var GAP = 2;               // 카드 사이 간격(원본 px). 카드별 위/아래 14px 패딩이 남으므로 간격은 최소만. effScale 곱해 캔버스 픽셀로 적용.

      // 캔버스 1회 캡처 옵션 (runCapture 의 buildOpts 와 동일한 트레이드오프: 애니메이션 끄기 + SVG 최종 stroke 복사)
      var SVG_SHAPE_SEL = "circle,path,ellipse,rect,line,polyline,polygon";
      var SVG_COPY_PROPS = ["stroke", "strokeDasharray", "strokeDashoffset", "fill", "strokeWidth", "opacity"];
      function buildOpts(captureEl, captureScale){
        var fullW = (captureEl && (captureEl.scrollWidth || captureEl.getBoundingClientRect().width)) || 0;
        var fullH = (captureEl && (captureEl.scrollHeight || captureEl.getBoundingClientRect().height)) || 0;
        return {
          backgroundColor: bg,
          scale: captureScale,
          width: fullW,
          height: fullH,
          useCORS: true,
          logging: false,
          onclone: function(clonedDoc, clonedEl){
            try {
              try {
                var st = clonedDoc.createElement("style");
                st.setAttribute("data-bc-cap-disable-anim", "1");
                st.appendChild(clonedDoc.createTextNode(
                  "*{animation:none !important;transition:none !important;animation-duration:0s !important;}"
                ));
                (clonedDoc.head || clonedDoc.documentElement || clonedEl).appendChild(st);
              } catch (e1) {}
              try {
                var origRoot = captureEl;
                if (origRoot && clonedEl) {
                  var win = (origRoot.ownerDocument && origRoot.ownerDocument.defaultView) || window;
                  var origShapes  = origRoot.querySelectorAll(SVG_SHAPE_SEL);
                  var cloneShapes = clonedEl.querySelectorAll(SVG_SHAPE_SEL);
                  var n = Math.min(origShapes.length, cloneShapes.length);
                  for (var i = 0; i < n; i++) {
                    var os = origShapes[i], cs = cloneShapes[i];
                    if (!os || !cs) continue;
                    var cssOrig;
                    try { cssOrig = win.getComputedStyle(os); } catch(_){ cssOrig = null; }
                    if (!cssOrig) continue;
                    for (var k = 0; k < SVG_COPY_PROPS.length; k++) {
                      var prop = SVG_COPY_PROPS[k];
                      var val = cssOrig[prop];
                      if (val === undefined || val === null || val === "") continue;
                      try { cs.style[prop] = val; } catch(_){}
                    }
                  }
                }
              } catch (e2) {}
            } catch (eAll) {}
          }
        };
      }

      var CONTAINER_TIMEOUT_MS = 30000;
      var maxH = 30000;          // 캔버스 높이 한계 (PDF 와 동일 기준)
      var baseScale = 1.0;

      // 큰 컨테이너 1회 캡처 (PDF 의 captureContainerOnce 와 동일)
      function captureContainerOnce(container, scaleCap, label){
        var sh = container.scrollHeight || container.getBoundingClientRect().height || 1;
        var effScale = Math.min(scaleCap, maxH / sh);
        if (!isFinite(effScale) || effScale <= 0) effScale = scaleCap;
        try { console.log("[CAP-JPG] capture container", label, "scrollH=", sh, "effScale=", effScale.toFixed(3)); } catch(_){}
        var t, timedOut = false;
        var timeoutP = new Promise(function(_, reject){
          t = setTimeout(function(){
            timedOut = true;
            purgeHtml2canvasArtifacts();
            reject(new Error("container-timeout"));
          }, CONTAINER_TIMEOUT_MS);
        });
        var capP = window.html2canvas(container, buildOpts(container, effScale));
        return Promise.race([ capP, timeoutP ]).then(function(canvas){
          clearTimeout(t);
          return { canvas: canvas, effScale: effScale };
        }).catch(function(err){
          clearTimeout(t);
          if (timedOut) purgeHtml2canvasArtifacts();
          throw err;
        });
      }

      // 큰 canvas(big)에서 선택된 카드 영역들의 좌표/높이를 계산해 [{srcY, srcH}] 목록으로 만든다.
      //   (PDF sliceAndBuild 의 좌표 계산과 동일 — 페이지로 나누지 않고 목록만 뽑는다.)
      function computeSlices(big, container, effScale){
        var contRect = container.getBoundingClientRect();
        var bigH = big.height;
        var out = [];
        for (var i = 0; i < selected.length; i++){
          var el = selected[i].el;
          if (!el || !document.body.contains(el)) continue;
          var r = el.getBoundingClientRect();
          // 카드 위/아래 과한 패딩(기본 32~33px)을 KEEP_PAD 만큼만 남기고 깎아, 이어붙였을 때
          //   카드 사이 빈 띠가 들쭉날쭉/휑하지 않게 촘촘·균일하게 만든다. (내용은 안 깎음 — 패딩만)
          var csEl = window.getComputedStyle(el);
          var KEEP_PAD = 14;
          var topTrim = Math.max(0, (parseFloat(csEl.paddingTop) || 0) - KEEP_PAD);
          var botTrim = Math.max(0, (parseFloat(csEl.paddingBottom) || 0) - KEEP_PAD);
          var relTop = (r.top - contRect.top) + topTrim;
          var srcY = Math.round(relTop * effScale);
          var srcH = Math.round((r.height - topTrim - botTrim) * effScale);
          if (srcY < 0) { srcH += srcY; srcY = 0; }
          if (srcY > bigH) continue;
          if (srcY + srcH > bigH) srcH = bigH - srcY;
          if (srcH <= 0) continue;
          out.push({ srcY: srcY, srcH: srcH });
        }
        return out;
      }

      // 선택된 카드 영역들을 세로로 이어붙인 단일 canvas 를 만든다.
      //   합친 높이가 maxH 를 넘으면 down 배율로 축소해 export 실패를 막는다.
      function buildStitched(big, slices, gapPx){
        var bigW = big.width;
        var total = 0;
        for (var i = 0; i < slices.length; i++) total += slices[i].srcH;
        var gaps = slices.length > 0 ? (slices.length - 1) * gapPx : 0;
        var fullH = total + gaps;
        // 폭/높이 모두 maxH 한계 안으로 (down ≤ 1)
        var down = Math.min(1, maxH / Math.max(1, fullH), maxH / Math.max(1, bigW));
        if (!isFinite(down) || down <= 0) down = 1;
        var outW = Math.max(1, Math.floor(bigW * down));
        var outH = Math.max(1, Math.floor(fullH * down));
        try { console.log("[CAP-JPG] stitch cards=", slices.length, "fullH=", fullH, "down=", down.toFixed(3), "out=", outW + "x" + outH); } catch(_){}

        var out = document.createElement("canvas");
        out.width = outW;
        out.height = outH;
        var ctx = out.getContext("2d");
        ctx.fillStyle = bg;
        ctx.fillRect(0, 0, outW, outH);

        var y = 0;     // 원본(축소 전) 기준 누적 y
        var tot = slices.length;
        for (var j = 0; j < slices.length; j++){
          var s = slices[j];
          var pct = Math.round((j / Math.max(1, tot)) * 100);
          setProgress(pct, "JPG 저장 중… (" + (j + 1) + "/" + tot + ")");
          setBusyProgress(j + 1, tot);
          // big 의 [0, srcY]~[bigW, srcY+srcH] 를 out 의 (0, y*down) 위치에 축소해서 그린다.
          var dy = Math.round(y * down);
          var dh = Math.round(s.srcH * down);
          if (dh <= 0) dh = 1;
          try {
            ctx.drawImage(big, 0, s.srcY, bigW, s.srcH, 0, dy, outW, dh);
          } catch(_){}
          y += s.srcH + gapPx;
        }
        return out;
      }

      // 합친 canvas 를 JPEG blob 으로 만들어 <a download> 로 저장 (PDF 의 downloadViaBlob 과 동일 방식)
      function exportJpg(canvas){
        return new Promise(function(resolve){
          var done = false;
          function saveBlob(blob){
            if (!blob){ resolve(false); return; }
            try {
              var url = (window.URL || window.webkitURL).createObjectURL(blob);
              var name = "빈크래프트_상권분석_" + todayStamp() + ".jpg";
              var a = document.createElement("a");
              a.href = url;
              a.download = name;
              a.rel = "noopener";
              a.style.display = "none";
              document.body.appendChild(a);
              a.click();
              setTimeout(function(){
                try { if (a.parentNode) a.parentNode.removeChild(a); } catch(_){}
                try { (window.URL || window.webkitURL).revokeObjectURL(url); } catch(_){}
              }, 40000);
              console.log("[CAP-JPG] saved OK (blob)");
              resolve(true);
            } catch (e){
              console.error("[CAP-JPG] blob save failed", e);
              resolve(false);
            }
          }
          try {
            if (canvas.toBlob){
              canvas.toBlob(function(blob){ if (!done){ done = true; saveBlob(blob); } }, "image/jpeg", 0.92);
              // 일부 환경에서 toBlob 콜백이 안 올 때를 대비한 폴백(dataURL)
              setTimeout(function(){
                if (done) return;
                done = true;
                try {
                  var dataUrl = canvas.toDataURL("image/jpeg", 0.92);
                  var bin = atob(dataUrl.split(",")[1]);
                  var len = bin.length, arr = new Uint8Array(len);
                  for (var i = 0; i < len; i++) arr[i] = bin.charCodeAt(i);
                  saveBlob(new Blob([arr], { type: "image/jpeg" }));
                } catch (e2){ console.error("[CAP-JPG] dataURL fallback failed", e2); resolve(false); }
              }, 8000);
            } else {
              var dataUrl0 = canvas.toDataURL("image/jpeg", 0.92);
              var bin0 = atob(dataUrl0.split(",")[1]);
              var len0 = bin0.length, arr0 = new Uint8Array(len0);
              for (var k = 0; k < len0; k++) arr0[k] = bin0.charCodeAt(k);
              saveBlob(new Blob([arr0], { type: "image/jpeg" }));
            }
          } catch (e){ console.error("[CAP-JPG] export failed", e); resolve(false); }
        });
      }

      function finishJpg(){
        btn.classList.remove("bc-cap-hidden");
        overlay.classList.remove("bc-cap-hidden");
        setBusy(false);
        hideProgress();
      }

      function failJpg(){
        purgeHtml2canvasArtifacts();
        btn.classList.remove("bc-cap-hidden");
        overlay.classList.remove("bc-cap-hidden");
        setBusy(false);
        hideProgress();
        showErr("JPG 저장에 실패했습니다. 다시 시도해 주세요.");
      }

      function buildAndExport(big, container, effScale){
        var slices = computeSlices(big, container, effScale);
        if (slices.length === 0){ failJpg(); return; }
        var stitched = buildStitched(big, slices, Math.round(GAP * effScale));
        if (!stitched || !stitched.width || !stitched.height){ failJpg(); return; }
        setProgress(95, "JPG 저장 중…");
        exportJpg(stitched).then(function(ok){
          // 메모리 회수 힌트
          try { stitched.width = stitched.height = 0; } catch(_){}
          if (ok){ finishJpg(); overlay.classList.remove("open"); }
          else { failJpg(); }
        });
      }

      function startJpgFlow(){
        var els = selected.map(function(c){ return c.el; }).filter(Boolean);
        var container = findCommonContainer(els);
        if (!container){ failJpg(); return; }
        try { container.scrollTo ? container.scrollTo({top:0, behavior:"auto"}) : (container.scrollTop = 0); } catch(_){}
        setProgress(5, "캡처 준비 중…");
        wait(500).then(function(){
          setProgress(15, "캡처 중…");
          captureContainerOnce(container, baseScale, "JPG-1차").then(function(res){
            if (!res.canvas || !res.canvas.width || !res.canvas.height) throw new Error("empty-container-canvas");
            buildAndExport(res.canvas, container, res.effScale);
          }).catch(function(err){
            if (window.console && console.warn) console.warn("[CAP-JPG 1차 실패→재시도]", err);
            purgeHtml2canvasArtifacts();
            wait(150).then(function(){
              captureContainerOnce(container, Math.max(1, baseScale * 0.6), "JPG-재시도").then(function(res2){
                if (!res2.canvas || !res2.canvas.width || !res2.canvas.height) throw new Error("empty-container-canvas-retry");
                buildAndExport(res2.canvas, container, res2.effScale);
              }).catch(function(err2){
                if (window.console && console.warn) console.warn("[CAP-JPG 재시도도 실패]", err2);
                failJpg();
              });
            });
          });
        });
      }

      var fontsReadyJpg = (document.fonts && document.fonts.ready) ? document.fonts.ready : Promise.resolve();
      Promise.resolve(fontsReadyJpg).then(startJpgFlow, startJpgFlow);
    }
  })();
  </script>
</body>
