<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>빈크래프트 — 상권분석</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
  :root{ --blue:#2b7fff; --blue-soft:#9cc0ff; --ink:rgba(255,255,255,.94); --ink2:rgba(255,255,255,.5); --ink3:rgba(255,255,255,.3); --line:rgba(255,255,255,.08); --mono:ui-monospace,'SF Mono',monospace; --panel:#0a0c10; --tx2:rgba(255,255,255,.5); --tx3:rgba(255,255,255,.3); --tx4:rgba(255,255,255,.2); }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{background:#000;color:var(--ink);font-family:'Pretendard',system-ui,sans-serif;-webkit-font-smoothing:antialiased}
  body{overflow-x:hidden}

  .rail{position:fixed;left:clamp(16px,2.4vw,42px);top:16vh;bottom:16vh;width:1px;background:var(--line);z-index:40}
  .rail i{position:absolute;left:-1px;top:0;width:3px;border-radius:2px;height:0;background:rgba(255,255,255,.32)}
  /* 뇌에서 내려오는 빛줄기 — 페이지 끝까지 이어지는 파란 세로선 */
  .spine{position:fixed;left:50%;transform:translateX(-50%);top:0;bottom:0;width:1px;z-index:50;opacity:0;transition:opacity .55s ease;pointer-events:none;mix-blend-mode:screen;background:linear-gradient(180deg,rgba(120,170,255,.22),rgba(70,140,255,.13));box-shadow:0 0 5px rgba(80,150,255,.16)}

  /* 1. 인트로 영상 (제대로 밝게) */
  .hero{height:100vh;position:relative;overflow:hidden;display:flex;align-items:flex-end;justify-content:center}
  .hero video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;filter:brightness(.7) contrast(1.02)}
  .hero::after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,.25) 0%,transparent 28%,transparent 55%,rgba(0,0,0,.78) 100%)}
  .hero .hwrap{position:relative;z-index:2;text-align:center;padding-bottom:16vh}
  .hero h1{font-weight:300;font-size:clamp(30px,5vw,60px);letter-spacing:-1.5px;line-height:1.12;text-shadow:0 2px 40px rgba(0,0,0,.9);opacity:0}
  .hero h1 b{font-weight:600}
  .scroll-hint{position:absolute;bottom:34px;left:50%;transform:translateX(-50%);z-index:3;font-size:11px;letter-spacing:3px;color:var(--ink3);opacity:0}

  /* 2. 스토리 시퀀스 */
  .story{position:relative;height:600vh}
  .stage{position:sticky;top:0;height:100vh;overflow:hidden;background:radial-gradient(120% 90% at 50% 40%,rgba(255,255,255,.025),transparent 58%),#000}
  #fx{position:absolute;inset:0;width:100%;height:100%;z-index:1}

  .src{position:absolute;z-index:2;display:flex;align-items:center;gap:8px;padding:9px 14px 9px 11px;border:1px solid rgba(255,255,255,.14);border-radius:30px;background:rgba(12,14,18,.55);backdrop-filter:blur(6px);font-size:13px;color:rgba(255,255,255,.74);white-space:nowrap;opacity:0;will-change:transform,opacity}
  .src svg{width:15px;height:15px;flex-shrink:0;color:rgba(255,255,255,.5)}

  .tablet{position:absolute;left:50%;bottom:-44%;transform:translateX(-50%);width:min(880px,90vw);z-index:3;opacity:0;will-change:transform,opacity}
  .tablet-frame{position:relative;border:1px solid rgba(255,255,255,.12);border-radius:20px;background:linear-gradient(#0a0c10,#070809);box-shadow:0 40px 120px rgba(0,0,0,.72);padding:16px}
  .tablet-bar{display:flex;align-items:center;gap:6px;padding:0 6px 13px}
  .tablet-bar i{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.14)}
  .tablet-bar span{margin-left:10px;font-size:11px;color:rgba(255,255,255,.4);font-family:ui-monospace,monospace;letter-spacing:.5px}
  .tcards{display:grid;grid-template-columns:repeat(7,1fr);gap:8px}
  .tcard{position:relative;aspect-ratio:3/4;border:1px solid rgba(255,255,255,.1);border-radius:9px;background:rgba(255,255,255,.018);padding:11px 9px;display:flex;flex-direction:column;justify-content:space-between;opacity:0;will-change:transform,opacity}
  .tcard .ic{width:18px;height:18px;color:rgba(255,255,255,.42)}
  .tcard .nm{font-size:10px;color:rgba(255,255,255,.5);line-height:1.25}
  .tcard .vl{font-size:15px;font-weight:700;font-family:ui-monospace,monospace;color:#fff}
  .tcard.accent .vl{color:var(--blue-soft)}

  .cap{position:absolute;left:0;right:0;top:13vh;text-align:center;z-index:4;padding:0 24px;pointer-events:none}
  .cap .eye{font-size:11px;letter-spacing:4px;color:var(--ink3);text-transform:uppercase;margin-bottom:14px;opacity:0}
  .cap h2{font-weight:300;font-size:clamp(24px,4.4vw,50px);line-height:1.22;letter-spacing:-1px;opacity:0;color:var(--ink)}
  .cap h2 b{font-weight:700;color:#fff}

  /* 3. CTA */
  .cta{min-height:78vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:90px 24px;position:relative;z-index:60;background:transparent}
  .cta .eye{font-size:11px;letter-spacing:3px;color:var(--ink3);text-transform:uppercase;margin-bottom:22px;opacity:0}
  .cta .big{font-weight:300;font-size:clamp(28px,4.6vw,54px);letter-spacing:-1.2px;line-height:1.3;opacity:0}
  .cta .big b{font-weight:600}
  .btn{display:inline-block;margin-top:40px;padding:16px 44px;border-radius:40px;background:var(--blue);color:#fff;font-weight:600;font-size:15px;text-decoration:none;box-shadow:0 0 28px rgba(43,127,255,.26);opacity:0}
  footer{padding:54px 0;border-top:1px solid var(--line);color:var(--ink3);font-size:12px;text-align:center}

  /* 카드 덱 (14장 폴더 스택) — 은은 톤 */
  .show{position:relative;z-index:10;height:100vh;min-height:640px;overflow:hidden;background:#000}
  .show-bgnum{position:absolute;right:clamp(10px,4vw,70px);top:50%;transform:translateY(-50%);z-index:0;font-family:var(--mono);font-weight:600;font-size:clamp(180px,34vw,440px);line-height:.8;color:rgba(255,255,255,.025);letter-spacing:-10px;pointer-events:none;user-select:none}
  .show-inner{position:relative;z-index:2;height:100%;max-width:1640px;margin:0 auto;padding:84px clamp(28px,5vw,90px) 40px;display:grid;grid-template-columns:1.25fr .75fr;align-items:center;gap:clamp(36px,5vw,96px)}
  .show-deck{position:relative;width:100%;aspect-ratio:5/4;perspective:1800px;transform-style:preserve-3d}
  .deck-card{position:absolute;inset:0;border:1px solid rgba(255,255,255,.12);border-radius:16px;overflow:hidden;background:var(--panel);box-shadow:0 38px 90px rgba(0,0,0,.62);will-change:transform,opacity;transform-origin:center 80%;backface-visibility:hidden}
  .deck-card .dc-bar{position:absolute;top:0;left:0;right:0;height:34px;z-index:3;background:rgba(8,9,14,.96);border-bottom:1px solid rgba(255,255,255,.06);display:flex;align-items:center;gap:7px;padding:0 14px}
  .deck-card .dc-bar i{width:9px;height:9px;border-radius:50%;background:rgba(255,255,255,.16)}
  .deck-card .dc-bar .dc-url{margin-left:14px;font-family:var(--mono);font-size:10.5px;color:var(--tx3);letter-spacing:.4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .deck-card .dc-img{position:absolute;left:0;right:0;top:34px;bottom:0;display:flex;align-items:center;justify-content:center;background:#05060a}
  .deck-card .dc-img img{max-width:100%;max-height:100%;width:auto;height:auto;object-fit:contain;display:block}
  .show-txt{min-width:0}
  .show-cat{font-family:var(--mono);font-size:11.5px;letter-spacing:3px;color:rgba(255,255,255,.42);text-transform:uppercase;margin-bottom:18px;display:flex;align-items:center;gap:12px}
  .show-cat .bar{width:26px;height:1px;background:rgba(255,255,255,.25)}
  .show-num{font-family:var(--mono);font-size:13px;color:var(--tx3);margin-bottom:14px}
  .show-num b{color:#fff}
  .show-title{font-weight:500;font-size:clamp(28px,3.4vw,44px);letter-spacing:-1px;line-height:1.08}
  .show-desc{margin-top:20px;color:var(--tx2);font-size:15.5px;line-height:1.8;max-width:440px}
  .show-kpi{display:flex;gap:14px;margin-top:34px;flex-wrap:wrap}
  .show-kpi .km{border-left:2px solid rgba(255,255,255,.2);padding:2px 0 2px 14px;min-width:96px}
  .show-kpi .km .v{font-family:var(--mono);font-weight:600;font-size:clamp(20px,2.4vw,28px);color:#fff;letter-spacing:-.5px;line-height:1}
  .show-kpi .km .l{font-size:12px;color:var(--tx3);margin-top:8px}
  .show-rail{position:absolute;left:50%;bottom:30px;transform:translateX(-50%);z-index:3;display:flex;gap:7px}
  .show-rail i{width:18px;height:3px;border-radius:3px;background:rgba(255,255,255,.13);transition:background .3s}
  .show-rail i.on{background:rgba(255,255,255,.78)}
  .lb{position:fixed;inset:0;z-index:400;background:rgba(2,3,7,.93);display:flex;align-items:center;justify-content:center;opacity:0;visibility:hidden;transition:opacity .32s ease,visibility .32s;cursor:zoom-out;padding:5vh 5vw}
  .lb.on{opacity:1;visibility:visible}
  .lb img{max-width:100%;max-height:90vh;width:auto;height:auto;object-fit:contain;border-radius:12px;box-shadow:0 40px 110px rgba(0,0,0,.75),0 0 0 1px rgba(255,255,255,.08);transform:scale(.95);transition:transform .32s ease}
  .lb.on img{transform:scale(1)}
  .lb-hint{position:absolute;bottom:24px;left:50%;transform:translateX(-50%);font-family:var(--mono);font-size:11px;letter-spacing:1.5px;color:var(--tx3)}
  @media(max-width:900px){
    .show-inner{grid-template-columns:1fr;align-content:center;gap:24px;padding:80px 22px 60px}
    .show-deck{aspect-ratio:4/3;max-height:42vh}
    .show-title{font-size:26px}.show-desc{display:none}
    .show-bgnum{font-size:200px;opacity:.6}
  }
  @media(max-width:760px){.tcards{grid-template-columns:repeat(4,1fr)}}
</style>
</head>
<body>
<div class="rail"><i id="railFill"></i></div>
<div class="spine" id="spine"></div>

<!-- 1. 인트로 영상 -->
<section class="hero">
  <video id="heroVid" autoplay muted playsinline preload="auto" poster="assets/hero_poster.jpg"><source src="assets/intro_open.mp4" type="video/mp4"></video>
  <div class="scroll-hint" id="sh">SCROLL ↓</div>
</section>

<!-- 2. 스토리 시퀀스 -->
<section class="story" id="story">
  <div class="stage">
    <canvas id="fx"></canvas>
    <div class="cap" id="cap">
      <div class="eye" id="capEye">DATA</div>
      <h2 id="capH2">한 동네의 데이터가 <b>흩어져 있습니다.</b></h2>
    </div>
    <div class="tablet" id="tablet">
      <div class="tablet-frame">
        <div class="tablet-bar"><i></i><i></i><i></i><span>beancraft · 상권분석 리포트</span></div>
        <div class="tcards" id="tcards"></div>
      </div>
    </div>
  </div>
</section>

<!-- 2b. 14장 카드 덱 -->
<section class="show" id="show">
  <div class="show-bgnum" id="showBgnum">01</div>
  <div class="show-inner">
    <div class="show-deck" id="showDeck"></div>
    <div class="show-txt">
      <div class="show-cat"><span class="bar"></span><span id="showCat">입지 · 시장</span></div>
      <div class="show-num"><b id="showNum">01</b> / 14</div>
      <h3 class="show-title" id="showTitle">상권 분석</h3>
      <p class="show-desc" id="showDesc">반경 500m 매장 구성·개인/프랜차이즈 비율·평당 월세·공실률을 한눈에.</p>
      <div class="show-kpi" id="showKpi"></div>
    </div>
  </div>
  <div class="show-rail" id="showRail"></div>
</section>
<div id="lightbox" class="lb" aria-hidden="true"><img id="lbImg" src="" alt=""><div class="lb-hint">아무 곳이나 누르면 닫힙니다</div></div>

<!-- 3. CTA -->
<section class="cta">
  <div class="eye">START HERE</div>
  <div class="big">차리기 전에, <b>먼저 압니다.</b></div>
  <a href="#" class="btn">상담 신청</a>
</section>
<footer>© 2026 BeanCraft</footer>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
<script>
(function(){
  "use strict";
  gsap.registerPlugin(ScrollTrigger);

  // 영상
  var v=document.getElementById('heroVid'); if(v){ var go=function(){v.play().catch(function(){});}; go(); document.addEventListener('visibilitychange',function(){if(!document.hidden)go();}); }
  gsap.to('#sh',{opacity:1,duration:1,delay:1.2});
  ScrollTrigger.create({start:0,end:'max',onUpdate:function(self){
    var f=document.getElementById('railFill');if(f)f.style.height=(self.progress*100)+'%';
    var sp=document.getElementById('spine'),sw=document.getElementById('show'),ct=document.querySelector('.cta');
    if(sp&&sw&&ct){var vh=window.innerHeight,sR=sw.getBoundingClientRect(),cR=ct.getBoundingClientRect();sp.style.opacity=((sR.top<vh*0.55)&&(cR.top>vh*0.42))?'1':'0';}
  }});
  // 빛줄기(spine): 뇌 시퀀스 들어가면 나타나 카드~끝까지 이어짐
  // spine opacity는 위 onUpdate에서 위치 기반으로 처리
  gsap.utils.toArray('.cta .eye,.cta .big,.cta .btn').forEach(function(el){ gsap.to(el,{opacity:1,y:0,duration:1,ease:'power2.out',scrollTrigger:{trigger:el,start:'top 88%',once:true}}); });

  var IC = {
    foot:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="12" cy="7" r="3"/><path d="M6 21v-2a6 6 0 0 1 12 0v2"/></svg>',
    sales:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M3 17l5-5 4 4 8-8"/><path d="M21 8v5h-5"/></svg>',
    comp:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="4" y="10" width="4" height="9"/><rect x="10" y="5" width="4" height="14"/><rect x="16" y="13" width="4" height="6"/></svg>',
    rent:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M3 11l9-7 9 7"/><path d="M5 10v9h14v-9"/></svg>',
    sns:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M21 11.5a8.4 8.4 0 0 1-9 8.4L3 21l1.1-3.3A8.4 8.4 0 1 1 21 11.5z"/></svg>',
    weather:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4 12H2M22 12h-2M5 5l1.5 1.5M17.5 17.5L19 19"/></svg>'
  };
  var SOURCES=[{k:'foot',t:'유동인구'},{k:'sales',t:'매출 추이'},{k:'comp',t:'경쟁 강도'},{k:'rent',t:'임대 시세'},{k:'sns',t:'SNS 평판'},{k:'weather',t:'날씨 영향'}];
  var CARDS=[['상권 분석','378'],['상권 변화','36.9%'],['유동인구','611K'],['임대/창업','41만'],['고객 분석','30대'],['SNS 트렌드','90%'],['날씨 영향','17일'],['프랜차이즈','144'],['개인 카페','210'],['상권 경쟁','59점'],['매출 분석','1.0억'],['카페 기회','6.9%'],['배달 객단가','19571'],['AI 종합','59점']];

  var stage=document.querySelector('.stage');
  var cv=document.getElementById('fx'), x=cv.getContext('2d');
  var W=0,H=0,DPR=1,cx=0,cy=0;

  var srcEls=[];
  SOURCES.forEach(function(s){ var el=document.createElement('div'); el.className='src'; el.innerHTML=IC[s.k]+'<span>'+s.t+'</span>'; stage.appendChild(el); srcEls.push(el); });
  var tcards=document.getElementById('tcards'), cardEls=[];
  CARDS.forEach(function(c,i){ var el=document.createElement('div'); el.className='tcard'+(c[1].indexOf('점')>=0?' accent':''); el.innerHTML='<div class="ic">'+IC[['foot','sales','comp','rent','sns','weather'][i%6]]+'</div><div><div class="vl">'+c[1]+'</div><div class="nm">'+c[0]+'</div></div>'; tcards.appendChild(el); cardEls.push(el); });

  // 뉴럴 뇌 (노드 구체)
  var NODES=[], NN=150, links=[];
  (function(){
    for(var i=0;i<NN;i++){ var off=2/NN,y=i*off-1+off/2,r=Math.sqrt(1-y*y),phi=i*2.39996; NODES.push({x:Math.cos(phi)*r,y:y,z:Math.sin(phi)*r,ph:i*0.41%6.28,bl:i%13===0}); }
    for(var a=0;a<NN;a++){for(var b=a+1;b<NN;b++){var dx=NODES[a].x-NODES[b].x,dy=NODES[a].y-NODES[b].y,dz=NODES[a].z-NODES[b].z;if(dx*dx+dy*dy+dz*dz<0.16)links.push([a,b]);}}
  })();
  var yaw=0, tms=0;
  var S={glow:0,absorb:0,beam:0,brainR:0};

  function size(){ DPR=Math.min(2,window.devicePixelRatio||1); W=stage.clientWidth; H=stage.clientHeight; cv.width=Math.round(W*DPR); cv.height=Math.round(H*DPR); x.setTransform(DPR,0,0,DPR,0,0); cx=W*0.5; cy=H*0.42; S.brainR=Math.min(W,H)*0.17; layoutChips(); }
  function layoutChips(){ var R=Math.min(W,H)*0.42; srcEls.forEach(function(el,i){ var ang=(i/SOURCES.length)*Math.PI*2-Math.PI/2; el._hx=cx+Math.cos(ang)*R-el.offsetWidth/2; el._hy=cy+Math.sin(ang)*R*0.82-el.offsetHeight/2; }); }

  function draw(){
    requestAnimationFrame(draw); if(!W)return; tms+=16;
    x.clearRect(0,0,W,H);
    yaw += 0.0022 + S.glow*0.006; // 스크롤 깨어날수록 약간 빠르게
    var cyaw=Math.cos(yaw),syaw=Math.sin(yaw),pitch=0.5,cp=Math.cos(pitch),sp=Math.sin(pitch),R=S.brainR,proj=[];
    for(var i=0;i<NN;i++){ var n=NODES[i],rx=n.x*cyaw-n.z*syaw,rz=n.x*syaw+n.z*cyaw,ry=n.y*cp-rz*sp,rz2=n.y*sp+rz*cp,depth=(rz2+1.6)/2.6; proj.push({x:cx+rx*R,y:cy+ry*R,d:depth}); }
    // 링크 (연한 흰선)
    x.lineWidth=1;
    for(var l=0;l<links.length;l++){ var a=proj[links[l][0]],b=proj[links[l][1]],dd=(a.d+b.d)/2; x.strokeStyle='rgba(255,255,255,'+(0.025+S.glow*0.10*dd).toFixed(3)+')'; x.beginPath(); x.moveTo(a.x,a.y); x.lineTo(b.x,b.y); x.stroke(); }
    // 노드 (발광 없이, 연한 흰 + 일부 아주 연한 파랑)
    for(var i=0;i<NN;i++){ var p=proj[i],pulse=0.65+0.35*Math.sin(yaw*2+NODES[i].ph),br=(0.10+S.glow*0.5)*p.d*pulse; x.beginPath(); x.arc(p.x,p.y,(0.8+p.d*1.5)*(0.75+S.glow*0.35),0,6.28); x.fillStyle=NODES[i].bl?('rgba(140,180,255,'+(br*1.1).toFixed(3)+')'):('rgba(255,255,255,'+br.toFixed(3)+')'); x.fill(); }
    // 코어 — 은은한 빛 (아주 약하게)
    if(S.glow>0){ var cg=x.createRadialGradient(cx,cy,0,cx,cy,R*1.7); cg.addColorStop(0,'rgba(170,200,255,'+(S.glow*0.09).toFixed(3)+')'); cg.addColorStop(.5,'rgba(120,160,255,'+(S.glow*0.028).toFixed(3)+')'); cg.addColorStop(1,'transparent'); x.fillStyle=cg; x.beginPath(); x.arc(cx,cy,R*1.7,0,6.28); x.fill(); }
    // 흡수 (칩 → 뇌, 연한 흰 입자)
    if(S.absorb>0 && S.absorb<1){ for(var s=0;s<srcEls.length;s++){ var el=srcEls[s],sx=el._hx+el.offsetWidth/2,sy=el._hy+el.offsetHeight/2; for(var k=0;k<3;k++){ var tt=((S.absorb*2)+s*0.13+k*0.33)%1,px=sx+(cx-sx)*tt,py=sy+(cy-sy)*tt,o=Math.sin(tt*Math.PI); x.beginPath(); x.arc(px,py,1.8,0,6.28); x.fillStyle='rgba(220,232,255,'+(o*0.55).toFixed(2)+')'; x.fill(); } } }

  }
