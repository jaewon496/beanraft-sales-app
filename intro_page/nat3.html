<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>빈크래프트 — 전국 커버</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;background:#000;overflow:hidden}
  .sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}

  .stage{
    position:fixed;inset:0;width:100vw;height:100svh;height:100vh;
    background:#000;overflow:hidden;
    font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
  }
  #gl{position:absolute;inset:0;width:100%;height:100%;display:block}

  /* grain overlay — keeps gradient from banding, adds "film" texture */
  .grain{
    position:absolute;inset:0;pointer-events:none;mix-blend-mode:overlay;opacity:.045;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
  }
  /* vignette — pulls the eye to center, deepens the black edges */
  .vignette{
    position:absolute;inset:0;pointer-events:none;
    background:radial-gradient(120% 90% at 50% 42%, rgba(0,0,0,0) 38%, rgba(0,0,0,.55) 82%, rgba(0,0,0,.92) 100%);
  }

  .content{
    position:absolute;inset:0;display:flex;flex-direction:column;
    align-items:center;justify-content:center;text-align:center;
    padding:0 7vw;z-index:3;
  }
  .eyebrow{
    display:flex;align-items:center;gap:.65rem;
    font-size:clamp(11px,1.1vw,13px);letter-spacing:.42em;text-transform:uppercase;
    color:#7db4ff;font-weight:500;margin-bottom:clamp(22px,3.4vh,40px);
    opacity:0;transform:translateY(14px);
  }
  .eyebrow .dot{
    width:6px;height:6px;border-radius:50%;background:#2b7fff;
    box-shadow:0 0 14px 2px rgba(43,127,255,.9);
    animation:pulse 2.6s ease-in-out infinite;
  }
  @keyframes pulse{0%,100%{opacity:.45;transform:scale(.85)}50%{opacity:1;transform:scale(1.25)}}

  h1{
    font-size:clamp(28px,6vw,96px);line-height:1.08;font-weight:600;
    letter-spacing:-0.025em;
    text-shadow:0 2px 40px rgba(7,18,48,.55);
  }
  h1 .ln{display:block;overflow:hidden;padding:0.04em 0.08em;white-space:nowrap}
  h1 .ln > span{
    display:block;transform:translateY(112%);will-change:transform;
    background:linear-gradient(180deg,#ffffff 0%,#dbe9ff 56%,#9cc3ff 100%);
    -webkit-background-clip:text;background-clip:text;
    color:transparent;-webkit-text-fill-color:transparent;
  }
  h1 em{
    font-style:normal;
    background:linear-gradient(180deg,#7db4ff 0%,#2b7fff 100%);
    -webkit-background-clip:text;background-clip:text;
    color:#2b7fff;-webkit-text-fill-color:transparent;
  }

  .sub{
    margin-top:clamp(20px,3.2vh,38px);
    font-size:clamp(14px,1.7vw,21px);line-height:1.6;font-weight:400;
    color:rgba(214,228,255,.62);max-width:38ch;letter-spacing:0.005em;
    opacity:0;transform:translateY(16px);
  }

  .scrollcue{
    position:absolute;left:50%;bottom:clamp(22px,4vh,46px);transform:translateX(-50%);
    z-index:3;display:flex;flex-direction:column;align-items:center;gap:10px;
    opacity:0;
  }
  .scrollcue .lbl{font-size:11px;letter-spacing:.34em;text-transform:uppercase;color:rgba(160,190,235,.5)}
  .scrollcue .rail{width:1px;height:46px;background:linear-gradient(180deg,rgba(125,180,255,.55),rgba(125,180,255,0));position:relative;overflow:hidden}
  .scrollcue .rail::after{content:"";position:absolute;top:0;left:0;width:100%;height:14px;background:#7db4ff;animation:fall 2.2s cubic-bezier(.6,0,.2,1) infinite}
  @keyframes fall{0%{transform:translateY(-16px);opacity:0}30%{opacity:1}100%{transform:translateY(48px);opacity:0}}

  @media (max-width:640px){
    .eyebrow{letter-spacing:.3em}
    h1{letter-spacing:-0.02em}
    .sub{max-width:30ch}
  }
  @media (prefers-reduced-motion:reduce){
    .eyebrow .dot,.scrollcue .rail::after{animation:none}
  }
</style>
</head>
<body>
<section class="stage" aria-label="빈크래프트 전국 커버 소개">
  <h2 class="sr-only">전국 어디를 검색해도 그 동네 상권이 분석되는, 빈크래프트의 전국 커버리지를 흐르는 파랑 그라데이션 배경 위에 소개하는 화면입니다.</h2>

  <canvas id="gl" aria-hidden="true"></canvas>
  <div class="grain" aria-hidden="true"></div>
  <div class="vignette" aria-hidden="true"></div>

  <div class="content">
    <div class="eyebrow"><span class="dot"></span><span>Nationwide coverage</span></div>
    <h1>
      <span class="ln"><span>전국 어디를 찍어도,</span></span>
      <span class="ln"><span><em>그 동네</em>가 분석됩니다.</span></span>
    </h1>
    <p class="sub">대도시부터 읍·면·동까지 — 검색 한 번이면 그 상권의 데이터가 펼쳐집니다.</p>
  </div>

  <div class="scrollcue" aria-hidden="true">
    <span class="lbl">Scroll</span>
    <span class="rail"></span>
  </div>
</section>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script>
(function () {
  "use strict";

  /* ---------------- WebGL flowing mesh gradient ---------------- */
  var canvas = document.getElementById("gl");
  var gl = canvas.getContext("webgl", { antialias: true, alpha: false, premultipliedAlpha: false });

  var VERT = [
    "attribute vec2 p;",
    "void main(){ gl_Position = vec4(p,0.0,1.0); }"
  ].join("\n");

  /* Stripe-style: layered simplex noise warps a soft blue palette over near-black.
     No particles, no shapes — just a slow, premium fluid gradient. */
  var FRAG = [
    "precision highp float;",
    "uniform vec2 u_res;",
    "uniform float u_time;",
    "uniform float u_amp;",      // intro reveal amplitude 0..1
    "uniform vec2 u_mouse;",     // -1..1 parallax

    /* --- Ashima simplex noise (2D) --- */
    "vec3 mod289(vec3 x){return x-floor(x*(1.0/289.0))*289.0;}",
    "vec2 mod289(vec2 x){return x-floor(x*(1.0/289.0))*289.0;}",
    "vec3 permute(vec3 x){return mod289(((x*34.0)+1.0)*x);}",
    "float snoise(vec2 v){",
    "  const vec4 C=vec4(0.211324865405187,0.366025403784439,-0.577350269189626,0.024390243902439);",
    "  vec2 i=floor(v+dot(v,C.yy));",
    "  vec2 x0=v-i+dot(i,C.xx);",
    "  vec2 i1=(x0.x>x0.y)?vec2(1.0,0.0):vec2(0.0,1.0);",
    "  vec4 x12=x0.xyxy+C.xxzz; x12.xy-=i1;",
    "  i=mod289(i);",
    "  vec3 perm=permute(permute(i.y+vec3(0.0,i1.y,1.0))+i.x+vec3(0.0,i1.x,1.0));",
    "  vec3 m=max(0.5-vec3(dot(x0,x0),dot(x12.xy,x12.xy),dot(x12.zw,x12.zw)),0.0);",
    "  m=m*m; m=m*m;",
    "  vec3 x=2.0*fract(perm*C.www)-1.0;",
    "  vec3 h=abs(x)-0.5;",
    "  vec3 ox=floor(x+0.5);",
    "  vec3 a0=x-ox;",
    "  m*=1.79284291400159-0.85373472095314*(a0*a0+h*h);",
    "  vec3 g;",
    "  g.x=a0.x*x0.x+h.x*x0.y;",
    "  g.yz=a0.yz*x12.xz+h.yz*x12.yw;",
    "  return 130.0*dot(m,g);",
    "}",

    /* fractal brownian motion */
    "float fbm(vec2 q){",
    "  float f=0.0, a=0.5;",
    "  for(int i=0;i<5;i++){ f+=a*snoise(q); q*=2.02; a*=0.5; }",
    "  return f;",
    "}",

    "void main(){",
    "  vec2 uv=gl_FragCoord.xy/u_res.xy;",
    "  float asp=u_res.x/u_res.y;",
    "  vec2 p=uv; p.x*=asp;",
    "  float t=u_time*0.030;",

    /* LARGE-scale, slow domain warp — smooth flowing fields, not churning water.
       Low spatial frequency (0.55) = big soft blobs, the Stripe 'silk' look. */
    "  vec2 q=vec2(fbm(p*0.55+vec2(0.0,t)), fbm(p*0.55+vec2(4.3,-t*0.7)));",
    "  vec2 r=vec2(fbm(p*0.55+q*1.1+vec2(1.7,9.2)+t*0.35), fbm(p*0.55+q*1.1+vec2(8.3,2.8)-t*0.28));",
    "  float n=fbm(p*0.5+r*0.9);",
    "  n=n*0.5+0.5;",
    "  n=smoothstep(0.18,0.92,n);",        // gentle contrast, no harsh edges

    /* palette rides on near-black; blue only blooms in the brightest pools */
    "  vec3 c0=vec3(0.004,0.008,0.024);",   // near-black navy (the dominant tone)
    "  vec3 c1=vec3(0.020,0.066,0.190);",   // deep blue
    "  vec3 c2=vec3(0.106,0.330,0.760);",   // royal blue
    "  vec3 c3=vec3(0.310,0.560,1.000);",   // bright azure (rare highlight)
    "  vec3 col=mix(c0,c1,smoothstep(0.20,0.62,n));",
    "  col=mix(col,c2,smoothstep(0.62,0.86,n)*0.85);",
    "  col=mix(col,c3,smoothstep(0.86,0.99,n)*0.55);",

    /* one slow, soft sheen drifting across — adds the luxe sweep */
    "  float sheen=smoothstep(0.62,1.0,fbm(p*0.4+vec2(t*1.1,-t*0.4)+r*0.4));",
    "  col+=c2*sheen*0.16;",

    /* radial falloff: corners sink toward pure black, center holds the glow */
    "  vec2 cc=uv-0.5; cc.x*=asp;",
    "  float rad=length(cc);",
    "  float fade=smoothstep(1.0,0.12,rad);",
    "  col*=mix(0.10,1.0,fade);",

    /* keep the very center calm so the headline reads — dim a soft middle band */
    "  float mid=smoothstep(0.0,0.42,rad);",
    "  col*=mix(0.62,1.0,mid);",

    /* gentle parallax brightening toward cursor */
    "  vec2 mp=u_mouse*0.45; float ml=length((uv-0.5-mp));",
    "  col+=c2*smoothstep(0.55,0.0,ml)*0.06;",

    /* intro reveal: amplitude lifts the field out of black */
    "  col*=mix(0.0,1.0,u_amp);",

    /* modest exposure — luminous but restrained */
    "  col*=1.12;",

    /* soft tonemap + dither to kill banding */
    "  col=col/(col+vec3(0.92));",
    "  float dith=fract(sin(dot(gl_FragCoord.xy,vec2(12.9898,78.233)))*43758.5453);",
    "  col+=(dith-0.5)/255.0;",
    "  gl_FragColor=vec4(col,1.0);",
    "}"
  ].join("\n");

  var program, uRes, uTime, uAmp, uMouse, running = true, dpr = 1;
  var amp = 0;                 // animated 0->1 on reveal
  var mouseX = 0, mouseY = 0, tMouseX = 0, tMouseY = 0;
  var startT = performance.now();
  var hasGL = false;

  function compile(type, src) {
    var s = gl.createShader(type);
    gl.shaderSource(s, src);
    gl.compileShader(s);
    if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) {
      console.warn("shader", gl.getShaderInfoLog(s));
      return null;
    }
    return s;
  }

  function initGL() {
    if (!gl) return false;
    var vs = compile(gl.VERTEX_SHADER, VERT);
    var fs = compile(gl.FRAGMENT_SHADER, FRAG);
    if (!vs || !fs) return false;
    program = gl.createProgram();
    gl.attachShader(program, vs);
    gl.attachShader(program, fs);
    gl.linkProgram(program);
    if (!gl.getProgramParameter(program, gl.LINK_STATUS)) {
      console.warn("link", gl.getProgramInfoLog(program));
      return false;
    }
    gl.useProgram(program);

    var buf = gl.createBuffer();
    gl.bindBuffer(gl.ARRAY_BUFFER, buf);
    gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 3,-1, -1,3]), gl.STATIC_DRAW);
    var loc = gl.getAttribLocation(program, "p");
    gl.enableVertexAttribArray(loc);
    gl.vertexAttribPointer(loc, 2, gl.FLOAT, false, 0, 0);

    uRes = gl.getUniformLocation(program, "u_res");
    uTime = gl.getUniformLocation(program, "u_time");
    uAmp = gl.getUniformLocation(program, "u_amp");
    uMouse = gl.getUniformLocation(program, "u_mouse");
    return true;
  }

  function resize() {
    var w = canvas.clientWidth || window.innerWidth;
    var h = canvas.clientHeight || window.innerHeight;
    // cap DPR for perf; mobile gets a softer cap
    dpr = Math.min(window.devicePixelRatio || 1, w < 760 ? 1.6 : 2);
    canvas.width = Math.floor(w * dpr);
    canvas.height = Math.floor(h * dpr);
    if (hasGL) {
      gl.viewport(0, 0, canvas.width, canvas.height);
    }
  }

  function frame(now) {
    if (!running) return;
    var t = (now - startT) / 1000;
    // ease mouse
    mouseX += (tMouseX - mouseX) * 0.05;
    mouseY += (tMouseY - mouseY) * 0.05;
    gl.uniform2f(uRes, canvas.width, canvas.height);
    gl.uniform1f(uTime, t);
    gl.uniform1f(uAmp, amp);
    gl.uniform2f(uMouse, mouseX, mouseY);
    gl.drawArrays(gl.TRIANGLES, 0, 3);
    rafId = requestAnimationFrame(frame);
  }

  var rafId = null;
  function start() {
    if (!running) { running = true; }
    if (rafId == null) rafId = requestAnimationFrame(frame);
  }
  function stop() {
    running = false;
    if (rafId != null) { cancelAnimationFrame(rafId); rafId = null; }
  }

  /* ---------- CSS fallback if WebGL unavailable ---------- */
  function cssFallback() {
    canvas.style.display = "none";
    var s = document.querySelector(".stage");
    s.style.background =
      "radial-gradient(60% 50% at 50% 40%, rgba(43,127,255,.28), rgba(10,20,55,.10) 55%, #000 82%), #000";
  }

  hasGL = initGL();
  if (!hasGL) {
    cssFallback();
  } else {
    resize();
    window.addEventListener("resize", resize, { passive: true });

    window.addEventListener("mousemove", function (e) {
      tMouseX = (e.clientX / window.innerWidth) * 2 - 1;
      tMouseY = -((e.clientY / window.innerHeight) * 2 - 1);
    }, { passive: true });

    // visibility guard — pause when tab hidden or section scrolled offscreen
    document.addEventListener("visibilitychange", function () {
      if (document.hidden) stop(); else start();
    });
    if ("IntersectionObserver" in window) {
      var io = new IntersectionObserver(function (entries) {
        entries.forEach(function (en) {
          if (en.isIntersecting) start(); else stop();
        });
      }, { threshold: 0.02 });
      io.observe(document.querySelector(".stage"));
    }

    start();

    // animate field out of black (closure target, no reliance on `this`)
    var ampObj = { v: 0 };
    if (window.gsap) {
      gsap.to(ampObj, { v: 1, duration: 1.9, ease: "power2.out", delay: 0.15,
        onUpdate: function () { amp = ampObj.v; } });
    } else {
      var a0 = performance.now();
      (function ramp() {
        var k = Math.min((performance.now() - a0) / 1900, 1);
        amp = k * (2 - k);
        if (k < 1) requestAnimationFrame(ramp);
      })();
    }
  }

  /* ---------------- Typography reveal (GSAP) ---------------- */
  function revealText() {
    if (window.gsap) {
      var tl = gsap.timeline({ delay: 0.35 });
      tl.to(".eyebrow", { opacity: 1, y: 0, duration: 0.9, ease: "power3.out" })
        .to("h1 .ln > span", { y: "0%", duration: 1.15, ease: "expo.out", stagger: 0.12 }, "-=0.5")
        .to(".sub", { opacity: 1, y: 0, duration: 1.0, ease: "power3.out" }, "-=0.55")
        .to(".scrollcue", { opacity: 1, duration: 1.0, ease: "power2.out" }, "-=0.3");
    } else {
      document.querySelectorAll(".eyebrow,.sub,.scrollcue").forEach(function (el) { el.style.opacity = 1; el.style.transform = "none"; });
      document.querySelectorAll("h1 .ln > span").forEach(function (el) { el.style.transform = "none"; });
    }
  }
  revealText();
})();
</script>
</body>
</html>
