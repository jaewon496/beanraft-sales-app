<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>빈크래프트 — AI 스토리 시퀀스</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
  :root{ --blue:#2b7fff; --blue2:#7db4ff; }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{background:#000;color:#fff;font-family:'Pretendard',system-ui,sans-serif;-webkit-font-smoothing:antialiased}
  body{overflow-x:hidden}

  .story{position:relative;height:560vh}
  .stage{position:sticky;top:0;height:100vh;overflow:hidden;background:radial-gradient(120% 90% at 50% 38%,rgba(43,127,255,.08),transparent 60%),#000}
  #fx{position:absolute;inset:0;width:100%;height:100%;z-index:1}

  /* data source chips */
  .src{position:absolute;z-index:2;display:flex;align-items:center;gap:8px;padding:9px 14px 9px 11px;border:1px solid rgba(120,160,255,.28);border-radius:30px;background:rgba(10,15,26,.6);backdrop-filter:blur(6px);font-size:13px;color:#cfe0ff;white-space:nowrap;opacity:0;will-change:transform,opacity}
  .src svg{width:15px;height:15px;flex-shrink:0;color:var(--blue2)}

  /* tablet */
  .tablet{position:absolute;left:50%;bottom:-44%;transform:translateX(-50%);width:min(880px,90vw);z-index:3;opacity:0;will-change:transform,opacity}
  .tablet-frame{position:relative;border:1px solid rgba(120,160,255,.2);border-radius:20px;background:linear-gradient(#0a0e17,#070a11);box-shadow:0 40px 120px rgba(0,0,0,.7),0 0 70px rgba(43,127,255,.14);padding:16px}
  .tablet-bar{display:flex;align-items:center;gap:6px;padding:0 6px 13px}
  .tablet-bar i{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.16)}
  .tablet-bar span{margin-left:10px;font-size:11px;color:rgba(125,180,255,.6);font-family:ui-monospace,monospace;letter-spacing:.5px}
  .tcards{display:grid;grid-template-columns:repeat(7,1fr);gap:8px}
  .tcard{position:relative;aspect-ratio:3/4;border:1px solid rgba(120,160,255,.16);border-radius:9px;background:rgba(255,255,255,.02);padding:11px 9px;display:flex;flex-direction:column;justify-content:space-between;opacity:0;will-change:transform,opacity}
  .tcard .ic{width:18px;height:18px;color:var(--blue2)}
  .tcard .nm{font-size:10px;color:rgba(207,224,255,.7);line-height:1.25}
  .tcard .vl{font-size:15px;font-weight:700;font-family:ui-monospace,monospace;color:#fff}

  /* captions per scene */
  .cap{position:absolute;left:0;right:0;top:13vh;text-align:center;z-index:4;padding:0 24px;pointer-events:none}
  .cap .eye{font-size:11px;letter-spacing:4px;color:var(--blue2);text-transform:uppercase;margin-bottom:14px;opacity:0}
  .cap h2{font-weight:300;font-size:clamp(24px,4.4vw,50px);line-height:1.22;letter-spacing:-1px;opacity:0}
  .cap h2 b{font-weight:700;background:linear-gradient(120deg,#fff,#7db4ff);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}

  .hint{position:fixed;left:50%;bottom:26px;transform:translateX(-50%);font-size:11px;letter-spacing:2px;color:rgba(150,180,230,.5);z-index:9;animation:bob 2s ease-in-out infinite}
  @keyframes bob{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(6px)}}
  @media(max-width:760px){.tcards{grid-template-columns:repeat(4,1fr)}}
</style>
</head>
<body>
<section class="story" id="story">
  <div class="stage">
    <canvas id="fx"></canvas>

    <div class="cap" id="cap">
      <div class="eye" id="capEye">NATIONWIDE INTELLIGENCE</div>
      <h2 id="capH2">전국의 데이터가 <b>한 곳으로 모입니다.</b></h2>
    </div>

    <div class="tablet" id="tablet">
      <div class="tablet-frame">
        <div class="tablet-bar"><i></i><i></i><i></i><span>beancraft · 상권분석 리포트</span></div>
        <div class="tcards" id="tcards"></div>
      </div>
    </div>
  </div>
</section>

<div class="hint">SCROLL ↓</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
<script>
(function(){
  "use strict";
  gsap.registerPlugin(ScrollTrigger);

  /* ---------- icons (simple inline svg) ---------- */
  var IC = {
    foot:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="12" cy="7" r="3"/><path d="M6 21v-2a6 6 0 0 1 12 0v2"/></svg>',
    sales:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M3 17l5-5 4 4 8-8"/><path d="M21 8v5h-5"/></svg>',
    comp:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="4" y="10" width="4" height="9"/><rect x="10" y="5" width="4" height="14"/><rect x="16" y="13" width="4" height="6"/></svg>',
    rent:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M3 11l9-7 9 7"/><path d="M5 10v9h14v-9"/></svg>',
    sns:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M21 11.5a8.4 8.4 0 0 1-9 8.4L3 21l1.1-3.3A8.4 8.4 0 1 1 21 11.5z"/></svg>',
    weather:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4 12H2M22 12h-2M5 5l1.5 1.5M17.5 17.5L19 19"/></svg>'
  };
  var SOURCES = [
    {k:'foot', t:'유동인구'}, {k:'sales', t:'매출 추이'}, {k:'comp', t:'경쟁 강도'},
    {k:'rent', t:'임대 시세'}, {k:'sns', t:'SNS 평판'}, {k:'weather', t:'날씨 영향'}
  ];
  var CARDS = [
    ['상권 분석','378'],['상권 변화','36.9%'],['유동인구','611K'],['임대/창업','41만'],
    ['고객 분석','30대'],['SNS 트렌드','90%'],['날씨 영향','17일'],['프랜차이즈','144'],
    ['개인 카페','210'],['상권 경쟁','59점'],['매출 분석','1.0억'],['카페 기회','6.9%'],
    ['배달 객단가','19,571'],['AI 종합','59점']
  ];

  var stage = document.querySelector('.stage');
  var cv = document.getElementById('fx'), x = cv.getContext('2d');
  var W=0,H=0,DPR=1, cx=0, cy=0;

  /* ---------- build data-source chips ---------- */
  var srcEls=[];
  SOURCES.forEach(function(s,i){
    var el=document.createElement('div'); el.className='src';
    el.innerHTML=IC[s.k]+'<span>'+s.t+'</span>';
    stage.appendChild(el); srcEls.push(el);
  });
  /* ---------- build tablet cards ---------- */
  var tcards=document.getElementById('tcards'), cardEls=[];
  CARDS.forEach(function(c,i){
    var el=document.createElement('div'); el.className='tcard';
    el.innerHTML='<div class="ic">'+IC[['foot','sales','comp','rent','sns','weather'][i%6]]+'</div><div><div class="vl">'+c[1]+'</div><div class="nm">'+c[0]+'</div></div>';
    tcards.appendChild(el); cardEls.push(el);
  });

  /* ---------- neural brain (pseudo-3D node sphere) ---------- */
  var NODES=[], NN=150, links=[];
  (function(){
    for(var i=0;i<NN;i++){
      var off=2/NN, y=i*off-1+off/2, r=Math.sqrt(1-y*y);
      var phi=i*2.39996; // golden angle
      NODES.push({x:Math.cos(phi)*r, y:y, z:Math.sin(phi)*r, ph:Math.random()*6.28});
    }
    for(var a=0;a<NN;a++){ for(var b=a+1;b<NN;b++){ var dx=NODES[a].x-NODES[b].x,dy=NODES[a].y-NODES[b].y,dz=NODES[a].z-NODES[b].z; if(dx*dx+dy*dy+dz*dz<0.16) links.push([a,b]); } }
  })();
  var yaw=0;

  /* shared scroll-driven state */
  var S = { p:0, glow:0, brainR:0, brainY:0, absorb:0, beam:0 };

  function size(){
    DPR=Math.min(2,window.devicePixelRatio||1);
    W=stage.clientWidth; H=stage.clientHeight;
    cv.width=Math.round(W*DPR); cv.height=Math.round(H*DPR);
    x.setTransform(DPR,0,0,DPR,0,0);
    cx=W*0.5; cy=H*0.42;
    S.brainR=Math.min(W,H)*0.17;
    layoutChips();
  }
  function layoutChips(){
    // resting scattered positions around the brain
    var R=Math.min(W,H)*0.42;
    srcEls.forEach(function(el,i){
      var ang=(i/SOURCES.length)*Math.PI*2 - Math.PI/2;
      el._hx = cx + Math.cos(ang)*R - el.offsetWidth/2;
      el._hy = cy + Math.sin(ang)*R*0.82 - el.offsetHeight/2;
      el._ax = ang;
    });
  }

  function draw(){
    requestAnimationFrame(draw);
    if(!W) return;
    x.clearRect(0,0,W,H);
    yaw += 0.0025 + S.brainR*0.0; // base
    yaw += S.beam*0.0;
    var rotSpeed = 0.0025 + (S.glow*0.01);
    yaw += rotSpeed;

    // project nodes
    var cyaw=Math.cos(yaw), syaw=Math.sin(yaw);
    var pitch=0.5, cp=Math.cos(pitch), sp=Math.sin(pitch);
    var R=S.brainR, proj=[];
    for(var i=0;i<NN;i++){
      var n=NODES[i];
      var rx=n.x*cyaw - n.z*syaw;
      var rz=n.x*syaw + n.z*cyaw;
      var ry=n.y*cp - rz*sp;
      var rz2=n.y*sp + rz*cp;
      var depth=(rz2+1.6)/2.6;
      proj.push({x:cx+rx*R, y:cy+ry*R, d:depth, z:rz2});
    }
    // links
    x.lineWidth=1;
    for(var l=0;l<links.length;l++){
      var a=proj[links[l][0]], b=proj[links[l][1]];
      var dd=(a.d+b.d)/2;
      x.strokeStyle='rgba(70,130,230,'+(0.04+S.glow*0.18*dd).toFixed(3)+')';
      x.beginPath(); x.moveTo(a.x,a.y); x.lineTo(b.x,b.y); x.stroke();
    }
    // nodes
    for(var i=0;i<NN;i++){
      var p=proj[i]; var pulse=0.6+0.4*Math.sin(yaw*2+NODES[i].ph);
      var br=(0.12+S.glow*0.85)*p.d*pulse;
      x.beginPath(); x.arc(p.x,p.y,(0.8+p.d*1.6)*(0.7+S.glow*0.5),0,6.28);
      x.shadowColor='#2b7fff'; x.shadowBlur=S.glow*10*p.d;
      x.fillStyle='rgba(150,200,255,'+br.toFixed(3)+')'; x.fill();
    }
    x.shadowBlur=0;
    // core glow
    if(S.glow>0){
      var cg=x.createRadialGradient(cx,cy,0,cx,cy,R*1.6);
      cg.addColorStop(0,'rgba(120,180,255,'+(S.glow*0.5)+')');
      cg.addColorStop(.4,'rgba(43,127,255,'+(S.glow*0.16)+')');
      cg.addColorStop(1,'transparent');
      x.fillStyle=cg; x.beginPath(); x.arc(cx,cy,R*1.6,0,6.28); x.fill();
    }
    // absorb particles (chips -> brain)
    if(S.absorb>0 && S.absorb<1){
      for(var s=0;s<srcEls.length;s++){
        var el=srcEls[s];
        var sx=el._hx+el.offsetWidth/2, sy=el._hy+el.offsetHeight/2;
        for(var k=0;k<3;k++){
          var tt=((S.absorb*2)+s*0.13+k*0.33)%1;
          var px=sx+(cx-sx)*tt, py=sy+(cy-sy)*tt;
          var o=Math.sin(tt*Math.PI);
          x.beginPath(); x.arc(px,py,2,0,6.28); x.shadowColor='#7db4ff'; x.shadowBlur=8;
          x.fillStyle='rgba(180,215,255,'+(o*0.9).toFixed(2)+')'; x.fill();
        }
      }
      x.shadowBlur=0;
    }
    // beam down (brain -> tablet)
    if(S.beam>0){
      var by0=cy+R, by1=H*1.05;
      var grd=x.createLinearGradient(0,by0,0,by1);
      grd.addColorStop(0,'rgba(125,180,255,'+(S.beam*0.7)+')');
      grd.addColorStop(1,'rgba(43,127,255,0)');
      x.fillStyle=grd; x.fillRect(cx-2.5,by0,5,by1-by0);
      for(var k=0;k<6;k++){
        var tt=((performance.now()*0.0004)+(k/6))%1;
        var py=by0+(by1-by0)*tt;
        x.beginPath(); x.arc(cx,py,2.2,0,6.28); x.shadowColor='#7db4ff'; x.shadowBlur=10;
        x.fillStyle='rgba(190,220,255,'+((1-tt)*S.beam).toFixed(2)+')'; x.fill();
      }
      x.shadowBlur=0;
    }
    // position chips each frame (interpolated by absorb)
    var ab = S.absorb;
    for(var s=0;s<srcEls.length;s++){
      var el=srcEls[s];
      var tx=el._hx+(cx-el.offsetWidth/2 - el._hx)*ab;
      var ty=el._hy+(cy-el.offsetHeight/2 - el._hy)*ab;
      el.style.transform='translate('+tx.toFixed(1)+'px,'+ty.toFixed(1)+'px) scale('+(1-ab*0.5).toFixed(2)+')';
    }
  }
  window.addEventListener('resize',size); size(); requestAnimationFrame(draw);

  /* ---------- scroll timeline ---------- */
  // scenes: 0 gather | 1 absorb | 2 process | 3 output/cards | 4 nationwide
  var cap={eye:document.getElementById('capEye'),h2:document.getElementById('capH2')};
  function setCap(eye,h2){ cap.eye.textContent=eye; cap.h2.innerHTML=h2; }

  // chips fade-in at start
  gsap.to(srcEls,{opacity:1,duration:.5,stagger:.08,scrollTrigger:{trigger:'#story',start:'top top',end:'top -1',scrub:false}});

  var tl=gsap.timeline({ scrollTrigger:{ trigger:'#story', start:'top top', end:'bottom bottom', scrub:.6 } });

  // Scene 1: gather (chips visible, brain dark)
  tl.to(cap.eye,{opacity:1,duration:.3},0)
    .to(cap.h2,{opacity:1,duration:.4},0.05)
    .to(srcEls,{opacity:1,duration:.3,stagger:.04},0);

  // Scene 2: absorb -> brain wakes
  tl.to(S,{absorb:1,glow:.55,duration:1,onUpdate:function(){},ease:'power1.in'},1)
    .to(cap.h2,{opacity:0,duration:.25},1)
    .add(function(){ setCap('PROCESSING','AI가 <b>전국 데이터를 읽습니다.</b>'); },1.25)
    .to(cap.h2,{opacity:1,duration:.3},1.3)
    .to(srcEls,{opacity:0,duration:.3,stagger:.03},1.6);

  // Scene 3: process (brain bright, rotating) + beam down
  tl.to(S,{glow:1,duration:.8},2)
    .to(S,{beam:1,duration:.6},2.5)
    .to(cap.h2,{opacity:0,duration:.25},2.6)
    .add(function(){ setCap('OUTPUT','분석이 <b>14장으로 정렬됩니다.</b>'); },2.85)
    .to(cap.h2,{opacity:1,duration:.3},2.9);

  // Scene 4: tablet rises + cards settle
  tl.to('#tablet',{opacity:1,bottom:'-6%',duration:1,ease:'power2.out'},3)
    .to(cardEls,{opacity:1,duration:.5,stagger:{each:.04,from:'start'},ease:'back.out(1.4)'},3.3)
    .to(S,{glow:.6,beam:.3,duration:.6},3.6);

  // Scene 5: nationwide
  tl.to(cap.h2,{opacity:0,duration:.25},4.2)
    .add(function(){ setCap('NATIONWIDE','강남이든 제주든 — <b>어디든 똑같이.</b>'); },4.4)
    .to(cap.h2,{opacity:1,duration:.3},4.45);

})();
</script>
</body>
</html>
